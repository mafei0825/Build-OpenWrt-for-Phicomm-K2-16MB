name: K2 v22.4 OpenWrt 24.10.4 n7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 检出当前仓库（占位）
        uses: actions/checkout@v4

      - name: 清理旧的 openwrt 目录
        run: rm -rf openwrt

      - name: 下载 OpenWrt 24.10.4 源码
        run: |
          git clone --depth 1 -b openwrt-24.10 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git fetch --tags
          git checkout v24.10.4
          echo "✅ OpenWrt 24.10.4 源码下载完成"

      # 从你的配置仓库获取配置文件
      - name: 检出配置文件仓库
        uses: actions/checkout@v4
        with:
          repository: 'mafei0825/k2-openwrt-builder'
          path: 'config-repo'

      # ========== 16M闪存适配 ==========
      - name: 🔧 修改 DTS (8MB -> 16MB)
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          if [ -f "$FILE" ]; then
            echo "修改前 DTS 分区大小："
            grep -A5 "partition@50000" "$FILE"
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            echo "修改后 DTS 分区大小："
            grep -A5 "partition@50000" "$FILE"
          else
            echo "❌ DTS 文件不存在！"
            exit 1
          fi

      - name: 🔧 修改 Makefile (IMAGE_SIZE 8MB -> 16MB)
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            echo "修改前 IMAGE_SIZE："
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE"
            sed -i '/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            echo "修改后 IMAGE_SIZE："
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE"
          else
            echo "❌ Makefile 不存在！"
            exit 1
          fi

      # ========== 加载 .config ==========
      - name: 📝 加载 .config
        run: |
          cd openwrt
          cp ${{ github.workspace }}/config-repo/config-files-24.10/.config .config
          make defconfig
          echo "✅ .config 加载完成"

      # ========== 验证关键功能包 ==========
      - name: ✅ 验证关键功能包
        run: |
          cd openwrt
          echo "===== 关键功能包状态 ====="
          
          packages=(
            "kmod-wireguard"
            "wireguard-tools"
            "luci-proto-wireguard"
            "zerotier"
            "luci-app-zerotier"
            "owut"
            "luci-app-attendedsysupgrade"
            "luci"
            "luci-base"
            "luci-i18n-base-zh-cn"
            "luci-compat"
            "uhttpd"
            "uhttpd-mod-lua"
            "luci-proto-ipv6"
            "luci-app-firewall"
          )
          
          for pkg in "${packages[@]}"; do
            if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "✅ ${pkg} 已选中"
            else
              echo "❌ ${pkg} 未选中"
            fi
          done
          
          echo ""
          echo "===== 设备选择 ====="
          grep "CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2" .config || echo "❌ 设备未正确选择"
          
          echo ""
          echo "===== feeds 启用状态 ====="
          grep "CONFIG_FEED_luci=y" .config && echo "✅ luci feed 已启用" || echo "❌ luci feed 未启用"
          grep "CONFIG_FEED_packages=y" .config && echo "✅ packages feed 已启用" || echo "❌ packages feed 未启用"

      # ========== 更新 feeds ==========
      - name: 🔄 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ========== 下载源代码包 ==========
      - name: 📥 下载源代码包
        run: |
          cd openwrt
          make download -j8

      # ========== 编译固件 ==========
      - name: ⚙️ 编译固件
        run: |
          cd openwrt
          echo "开始编译时间: $(date)"
          make -j$(nproc) V=s
          echo "编译完成时间: $(date)"

      # ========== 推送更新后的配置到目标仓库 ==========
      - name: ⚙️ 配置 Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 📤 推送配置文件到目标仓库
        env:
          K2_DTS_MAKEFILE_CONFIG_IPK: ${{ secrets.K2_DTS_MAKEFILE_CONFIG_IPK }}
        run: |
          rm -rf target-repo
          git clone https://oauth2:${K2_DTS_MAKEFILE_CONFIG_IPK}@github.com/mafei0825/k2-openwrt-builder.git target-repo
          cd target-repo
          mkdir -p config-files-24.10
          cp ${{ github.workspace }}/openwrt/.config config-files-24.10/
          cp ${{ github.workspace }}/openwrt/target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts config-files-24.10/
          cp ${{ github.workspace }}/openwrt/target/linux/ramips/image/mt7620.mk config-files-24.10/
          git add config-files-24.10/
          git diff --quiet && git diff --staged --quiet || git commit -m "更新 K2 OpenWrt 24.10.4 配置文件 - $(date +'%Y-%m-%d %H:%M:%S')"
          git push https://oauth2:${K2_DTS_MAKEFILE_CONFIG_IPK}@github.com/mafei0825/k2-openwrt-builder.git main

      # ========== 整理固件文件 ==========
      - name: 📦 整理固件
        run: |
          cd openwrt
          mkdir -p firmware
          find bin/targets/ -name "*.bin" -exec cp {} firmware/ \;
          cd firmware
          md5sum *.bin > md5sums.txt
          echo "固件列表："
          ls -la

      # ========== 上传固件 ==========
      - name: ⬆️ 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: K2-v22.4-16M-24.10.4-全功能固件
          path: openwrt/firmware/
          retention-days: 30
