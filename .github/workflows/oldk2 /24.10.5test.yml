name: Test K2 DTS in OpenWrt 24.10.5

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git findutils tree

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OpenWrt 24.10.5 source
        run: |
          git clone --depth 1 -b openwrt-24.10 https://github.com/openwrt/openwrt.git
          cd openwrt
          git fetch --tags
          git checkout v24.10.5
          echo "✅ OpenWrt 24.10.5 source downloaded"
          echo "源码路径: $(pwd)"

      # ========== 1. 显示目录结构 ==========
      - name: 📁 Show directory structure
        run: |
          cd openwrt
          echo "========================================="
          echo "📁 target/linux/ramips/dts 目录结构"
          echo "========================================="
          
          if [ -d "target/linux/ramips/dts" ]; then
            ls -la target/linux/ramips/dts | head -30
          else
            echo "目录不存在"
          fi

      # ========== 2. 查找所有DTS文件 ==========
      - name: 🔍 Find all DTS files
        run: |
          cd openwrt
          echo "========================================="
          echo "🔍 查找所有DTS文件 (总数)"
          echo "========================================="
          
          TOTAL_FILES=$(find target/linux/ramips/dts -name "*.dts" -o -name "*.dtsi" 2>/dev/null | wc -l)
          echo "DTS文件总数: $TOTAL_FILES"
          
          echo ""
          echo "前30个DTS文件:"
          find target/linux/ramips/dts -name "*.dts" -o -name "*.dtsi" 2>/dev/null | sort | head -30

      # ========== 3. 查找K2相关文件（所有可能的命名方式）==========
      - name: 🔍 Find K2 related files
        run: |
          cd openwrt
          echo "========================================="
          echo "🔍 查找所有可能的K2相关文件"
          echo "========================================="
          
          # 根据之前版本的分析，K2的DTS文件可能有以下命名
          # - mt7620a_phicomm_k2.dts
          # - mt7620a_phicomm_k2x.dtsi
          # - mt7620a_phicomm_k2-v22.4.dts
          # - mt7620a_phicomm_k2-v22.5.dts
          # - mt7620a_phicomm_psg1218a.dts
          
          KEYWORDS="k2 phicomm psg1218 psg1218a k2x k2-v22 k2-v22.4 k2-v22.5"
          
          for keyword in $KEYWORDS; do
            echo ""
            echo "--- 搜索: $keyword ---"
            find target/linux/ramips/dts -name "*$keyword*" -ls 2>/dev/null || echo "  未找到"
          done

      # ========== 4. 在文件内容中查找K2相关信息 ==========
      - name: 🔍 Grep for K2 in DTS files
        run: |
          cd openwrt
          echo "========================================="
          echo "🔍 在DTS文件内容中查找K2相关信息"
          echo "========================================="
          
          DTS_FILES=$(find target/linux/ramips/dts -name "*.dts" -o -name "*.dtsi" 2>/dev/null)
          
          if [ -n "$DTS_FILES" ]; then
            echo ""
            echo "--- 查找 'k2' ---"
            grep -l "k2" $DTS_FILES 2>/dev/null | head -10 || echo "未找到"
            
            echo ""
            echo "--- 查找 'phicomm' ---"
            grep -l "phicomm" $DTS_FILES 2>/dev/null | head -10 || echo "未找到"
            
            echo ""
            echo "--- 查找 'psg1218' ---"
            grep -l "psg1218" $DTS_FILES 2>/dev/null | head -10 || echo "未找到"
            
            echo ""
            echo "--- 查找 'v22.4' ---"
            grep -l "v22.4" $DTS_FILES 2>/dev/null | head -10 || echo "未找到"
            
            echo ""
            echo "--- 查找 'v22.5' ---"
            grep -l "v22.5" $DTS_FILES 2>/dev/null | head -10 || echo "未找到"
          fi

      # ========== 5. 查找partition@50000定义 ==========
      - name: 🔍 Find partition@50000 definitions
        run: |
          cd openwrt
          echo "========================================="
          echo "🔍 查找包含 'partition@50000' 的文件"
          echo "========================================="
          
          DTS_FILES=$(find target/linux/ramips/dts -name "*.dts" -o -name "*.dtsi" 2>/dev/null)
          
          if [ -n "$DTS_FILES" ]; then
            PARTITION_FILES=$(grep -l "partition@50000" $DTS_FILES 2>/dev/null)
            
            if [ -n "$PARTITION_FILES" ]; then
              echo "找到以下文件包含分区定义:"
              echo "$PARTITION_FILES" | head -10
              
              echo ""
              echo "显示前3个文件的分区配置:"
              echo "$PARTITION_FILES" | head -3 | while read file; do
                echo ""
                echo "文件: $file"
                grep -A5 "partition@50000" "$file" | head -10
                echo "---"
              done
            else
              echo "未找到包含 partition@50000 的文件"
            fi
          fi

      # ========== 6. 检查mt7620.mk中的设备定义 ==========
      - name: 🔍 Check mt7620.mk for K2 device
        run: |
          cd openwrt
          echo "========================================="
          echo "🔍 检查 mt7620.mk 中的设备定义"
          echo "========================================="
          
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          
          if [ -f "$MK_FILE" ]; then
            echo "文件: $MK_FILE"
            echo ""
            echo "--- 查找 phicomm_k2 ---"
            grep -n "phicomm_k2" "$MK_FILE" || echo "未找到"
            
            echo ""
            echo "--- 查找 k2-v22 ---"
            grep -n "k2-v22" "$MK_FILE" || echo "未找到"
            
            echo ""
            echo "--- 查找 psg1218 ---"
            grep -n "psg1218" "$MK_FILE" || echo "未找到"
            
            echo ""
            echo "--- Device/phicomm_k2 定义 (如果有) ---"
            sed -n '/define Device\/phicomm_k2/,/endef/p' "$MK_FILE" || echo "未找到"
            
            echo ""
            echo "--- 所有包含 phicomm 的行 ---"
            grep -n "phicomm" "$MK_FILE" || echo "未找到"
          else
            echo "❌ 未找到 $MK_FILE"
          fi

      # ========== 7. 检查mt7620a_phicomm_k2x.dtsi文件 ==========
      - name: 🔍 Check for mt7620a_phicomm_k2x.dtsi
        run: |
          cd openwrt
          echo "========================================="
          echo "🔍 检查 mt7620a_phicomm_k2x.dtsi 文件"
          echo "========================================="
          
          K2X_FILE="target/linux/ramips/dts/mt7620a_phicomm_k2x.dtsi"
          
          if [ -f "$K2X_FILE" ]; then
            echo "✅ 找到文件: $K2X_FILE"
            echo ""
            echo "文件内容:"
            grep -A10 "partition@50000" "$K2X_FILE" || echo "未找到分区定义"
          else
            echo "❌ 未找到 $K2X_FILE"
          fi

      # ========== 8. 检查mt7620a_phicomm_psg1218a.dts文件 ==========
      - name: 🔍 Check for mt7620a_phicomm_psg1218a.dts
        run: |
          cd openwrt
          echo "========================================="
          echo "🔍 检查 mt7620a_phicomm_psg1218a.dts 文件"
          echo "========================================="
          
          PSG1218_FILE="target/linux/ramips/dts/mt7620a_phicomm_psg1218a.dts"
          
          if [ -f "$PSG1218_FILE" ]; then
            echo "✅ 找到文件: $PSG1218_FILE"
            echo ""
            echo "文件内容:"
            grep -A10 "partition@50000" "$PSG1218_FILE" || echo "未找到分区定义"
          else
            echo "❌ 未找到 $PSG1218_FILE"
          fi

      # ========== 9. 检查k2-v22.4/v22.5特定文件 ==========
      - name: 🔍 Check for k2-v22.4 and k2-v22.5 files
        run: |
          cd openwrt
          echo "========================================="
          echo "🔍 检查 k2-v22.4 和 k2-v22.5 文件"
          echo "========================================="
          
          V224_FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          V225_FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.5.dts"
          
          if [ -f "$V224_FILE" ]; then
            echo "✅ 找到 v22.4 文件: $V224_FILE"
            echo ""
            echo "文件内容:"
            grep -A5 "partition@50000" "$V224_FILE" || echo "未找到分区定义"
          else
            echo "❌ 未找到 v22.4 文件"
          fi
          
          echo ""
          if [ -f "$V225_FILE" ]; then
            echo "✅ 找到 v22.5 文件: $V225_FILE"
            echo ""
            echo "文件内容:"
            grep -A5 "partition@50000" "$V225_FILE" || echo "未找到分区定义"
          else
            echo "❌ 未找到 v22.5 文件"
          fi

      # ========== 10. 检查mt7620a_phicomm_k2.dts文件 ==========
      - name: 🔍 Check for mt7620a_phicomm_k2.dts
        run: |
          cd openwrt
          echo "========================================="
          echo "🔍 检查 mt7620a_phicomm_k2.dts 文件"
          echo "========================================="
          
          K2_FILE="target/linux/ramips/dts/mt7620a_phicomm_k2.dts"
          
          if [ -f "$K2_FILE" ]; then
            echo "✅ 找到文件: $K2_FILE"
            echo ""
            echo "文件内容:"
            grep -A10 "partition@50000" "$K2_FILE" || echo "未找到分区定义"
          else
            echo "❌ 未找到 $K2_FILE"
          fi

      # ========== 11. 总结 ==========
      - name: 📊 Summary
        run: |
          cd openwrt
          echo "========================================="
          echo "📊 测试总结 - OpenWrt 24.10.5"
          echo "========================================="
          
          # 统计所有相关文件
          K2_COUNT=$(find target/linux/ramips/dts -name "*k2*" 2>/dev/null | wc -l)
          PHICOMM_COUNT=$(find target/linux/ramips/dts -name "*phicomm*" 2>/dev/null | wc -l)
          PSG1218_COUNT=$(find target/linux/ramips/dts -name "*psg1218*" 2>/dev/null | wc -l)
          V224_COUNT=$(find target/linux/ramips/dts -name "*v22.4*" 2>/dev/null | wc -l)
          V225_COUNT=$(find target/linux/ramips/dts -name "*v22.5*" 2>/dev/null | wc -l)
          K2X_COUNT=$(find target/linux/ramips/dts -name "*k2x*" 2>/dev/null | wc -l)
          
          echo "统计结果:"
          echo "======================="
          echo "包含 'k2' 的文件数: $K2_COUNT"
          echo "包含 'phicomm' 的文件数: $PHICOMM_COUNT"
          echo "包含 'psg1218' 的文件数: $PSG1218_COUNT"
          echo "包含 'v22.4' 的文件数: $V224_COUNT"
          echo "包含 'v22.5' 的文件数: $V225_COUNT"
          echo "包含 'k2x' 的文件数: $K2X_COUNT"
          echo "======================="
          
          # 判断结果
          if [ $K2_COUNT -gt 0 ] || [ $PHICOMM_COUNT -gt 0 ] || [ $PSG1218_COUNT -gt 0 ]; then
            echo ""
            echo "✅ K2的DTS文件可能存在！"
            echo ""
            echo "找到的相关文件列表:"
            find target/linux/ramips/dts -name "*k2*" -o -name "*phicomm*" -o -name "*psg1218*" -o -name "*v22.4*" 2>/dev/null | head -10
          else
            echo ""
            echo "❌ K2的DTS文件不存在！"
          fi
          
          # 检查Makefile
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            echo ""
            echo "Makefile检查结果:"
            if grep -q "phicomm_k2" "$MK_FILE"; then
              echo "✅ Makefile中包含 phicomm_k2 定义"
            elif grep -q "psg1218" "$MK_FILE"; then
              echo "✅ Makefile中包含 psg1218 定义"
            else
              echo "❌ Makefile中不包含K2相关定义"
            fi
          fi
