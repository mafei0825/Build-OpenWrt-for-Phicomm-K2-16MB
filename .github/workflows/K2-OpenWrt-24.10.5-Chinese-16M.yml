name: Build K2 OpenWrt 24.10.5 Chinese UI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OpenWrt 24.10.5 source
        run: |
          git clone --depth 1 -b openwrt-24.10 https://github.com/openwrt/openwrt.git
          cd openwrt
          git fetch --tags
          git checkout v24.10.5
          echo "✅ OpenWrt 24.10.5 source downloaded"

      # ========== 调试步骤1：列出所有DTS文件 ==========
      - name: Debug - List all DTS files
        run: |
          cd openwrt
          echo "========================================="
          echo "🔍 调试信息：所有DTS文件列表"
          echo "========================================="
          find target/linux/ramips/dts -name "*.dts" -o -name "*.dtsi" | sort
          echo ""
          echo "========================================="
          echo "🔍 调试信息：包含 'k2' 或 'phicomm' 的文件"
          echo "========================================="
          find target/linux/ramips/dts -name "*k2*" -o -name "*phicomm*" | sort
          echo ""

      # ========== 调试步骤2：自动查找并显示分区配置 ==========
      - name: Debug - Show partition definitions
        run: |
          cd openwrt
          echo "========================================="
          echo "🔍 查找包含 'partition@50000' 定义的文件"
          echo "========================================="
          
          # 在所有DTS文件中查找分区定义
          grep -l "partition@50000" $(find target/linux/ramips/dts -name "*.dts" -o -name "*.dtsi") 2>/dev/null || echo "未找到分区定义"
          
          echo ""
          echo "========================================="
          echo "🔍 显示找到的分区配置"
          echo "========================================="
          
          # 显示找到的分区配置
          for file in $(grep -l "partition@50000" $(find target/linux/ramips/dts -name "*.dts" -o -name "*.dtsi") 2>/dev/null | head -3); do
            echo "文件: $file"
            grep -A5 "partition@50000" "$file" | head -10
            echo "---"
          done

      # ========== 自动修改DTS文件（16MB闪存） ==========
      - name: Auto-modify DTS for 16MB flash
        run: |
          cd openwrt
          echo "========================================="
          echo "🔧 自动修改DTS文件支持16MB闪存"
          echo "========================================="
          
          # 自动查找包含分区定义的文件
          TARGET_FILES=$(grep -l "partition@50000" $(find target/linux/ramips/dts -name "*.dts" -o -name "*.dtsi") 2>/dev/null | grep -i "k2\|phicomm" || echo "")
          
          if [ -n "$TARGET_FILES" ]; then
            for file in $TARGET_FILES; do
              echo "修改文件: $file"
              cp "$file" "${file}.bak"
              
              # 显示修改前的内容
              echo "修改前:"
              grep -A5 "partition@50000" "$file" | head -5
              
              # 将8MB(0x7b0000或0xfb0000)改为16MB(0x1fb0000)
              sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$file"
              sed -i 's/reg = <0x50000 0xfb0000>/reg = <0x50000 0x1fb0000>/' "$file"
              
              # 显示修改后的内容
              echo "修改后:"
              grep -A5 "partition@50000" "$file" | head -5
              echo "---"
            done
            echo "✅ 16MB闪存修改完成"
          else
            echo "⚠️ 未找到K2相关的分区定义文件，将继续编译"
          fi

      # ========== 修改Makefile ==========
      - name: Modify Makefile for 16MB
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          
          if [ -f "$MK_FILE" ]; then
            echo "修改 Makefile: $MK_FILE"
            sed -i '/define Device\/phicomm_k2/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            echo "修改后的 IMAGE_SIZE:"
            sed -n '/define Device\/phicomm_k2/,/endef/p' "$MK_FILE" | grep "IMAGE_SIZE"
          fi

      # ========== 创建配置文件 ==========
      - name: Create config file
        run: |
          cd openwrt
          
          cat > .config << 'EOF'
CONFIG_TARGET_ramips=y
CONFIG_TARGET_ramips_mt7620=y
CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2=y
CONFIG_TARGET_DEVICE_ramips_mt7620_DEVICE_phicomm_k2=y
CONFIG_TARGET_ROOTFS_PARTSIZE=16
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-ssl=y
CONFIG_PACKAGE_luci-app-firewall=y
CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
CONFIG_LUCI_LANG_zh_Hans=y
CONFIG_PACKAGE_kmod-wireguard=y
CONFIG_PACKAGE_wireguard-tools=y
CONFIG_PACKAGE_luci-app-wireguard=y
CONFIG_PACKAGE_luci-i18n-wireguard-zh-cn=y
CONFIG_PACKAGE_zerotier=y
CONFIG_PACKAGE_luci-app-zerotier=y
CONFIG_PACKAGE_luci-i18n-zerotier-zh-cn=y
CONFIG_PACKAGE_kmod-mt76-core=y
CONFIG_PACKAGE_kmod-mt76x2=y
EOF
          
          make defconfig
          make defconfig  # 二次同步确保配置完整

      # ========== 更新feeds ==========
      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ========== 下载源码包 ==========
      - name: Download packages
        run: |
          cd openwrt
          make download -j8

      # ========== 编译固件 ==========
      - name: Compile firmware
        run: |
          cd openwrt
          echo "开始编译时间: $(date)"
          make tools/compile -j$(nproc)
          make toolchain/compile -j$(nproc)
          make -j$(nproc) V=s

      # ========== 上传固件 ==========
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: K2-16M-24.10.5-ChineseUI
          path: openwrt/bin/targets/**/*.bin
          retention-days: 30
