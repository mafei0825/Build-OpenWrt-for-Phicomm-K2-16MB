name: K2 v22.4 OpenWrt 23.05.5 16M + chn n3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 OpenWrt 23.05.5 源码
        run: |
          git clone --depth 1 -b openwrt-23.05 https://github.com/openwrt/openwrt.git
          cd openwrt
          git fetch --tags
          git checkout v23.05.5
          echo "✅ OpenWrt 23.05.5 源码下载完成"

      # ========== 1. 下载官方配置作为基础 ==========
      - name: 📥 下载官方配置以确保兼容性
        run: |
          cd openwrt
          # 下载官方针对此目标平台的完整配置文件
          wget -O .config \
          https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7620/config.buildinfo
          echo "✅ 已下载官方配置作为基础"
          
          # 显示官方配置的前几行（确认版本）
          echo "官方配置预览:"
          head -10 .config

      # ========== 2. 16M闪存适配（不改变内核配置）==========
      - name: 🔧 修改 DTS 文件 (8MB -> 16MB)
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          if [ -f "$FILE" ]; then
            echo "========================================="
            echo "📄 修改前 DTS 内容:"
            echo "========================================="
            cat "$FILE"
            echo ""
            echo "【执行修改】将 0x7b0000 替换为 0x1fb0000"
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            echo ""
            echo "========================================="
            echo "📄 修改后 DTS 内容:"
            echo "========================================="
            cat "$FILE"
            echo "✅ v22.4 DTS 修改完成"
          else
            echo "❌ 文件不存在: $FILE"; exit 1
          fi

      - name: 🔧 修改 Makefile (8MB -> 16MB)
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            echo "========================================="
            echo "📄 修改前 Makefile 内容:"
            echo "========================================="
            cat "$MK_FILE"
            echo ""
            echo "【执行修改】将 IMAGE_SIZE 改为 16064k"
            sed -i '/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            echo ""
            echo "========================================="
            echo "📄 修改后 Makefile 内容:"
            echo "========================================="
            cat "$MK_FILE"
            echo "✅ Makefile 修改完成"
          else
            echo "❌ 文件不存在: $MK_FILE"; exit 1
          fi

      # ========== 3. 关键步骤：配置同步 ==========
      - name: 🔄 运行 defconfig 同步配置
        run: |
          cd openwrt
          make defconfig
          echo "✅ 配置同步完成"

      # ========== 4. 更新 Feeds ==========
      - name: 🔄 更新 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ========== 5. 编译内核并提取 VERMAGIC（关键调试步骤）==========
      - name: 🔍 编译内核并提取 VERMAGIC
        run: |
          cd openwrt
          
          echo "========================================="
          echo "🔍 开始编译内核以提取 VERMAGIC"
          echo "========================================="
          
          # 先编译工具链
          make tools/compile -j$(nproc)
          make toolchain/compile -j$(nproc)
          
          # 编译内核（即使可能报错，也会生成 .vermagic）
          make target/linux/compile || true
          
          echo "========================================="
          echo "📊 查找并显示 VERMAGIC"
          echo "========================================="
          
          # 查找所有 .vermagic 文件
          find build_dir/ -name ".vermagic" -exec ls -la {} \; 2>/dev/null || echo "未找到 .vermagic 文件"
          
          echo ""
          echo "【当前编译环境的内核 VERMAGIC】"
          # 显示找到的 .vermagic 内容
          for f in $(find build_dir/ -name ".vermagic" 2>/dev/null); do
            echo "文件: $f"
            echo "内容: $(cat $f)"
            echo ""
          done

      # ========== 6. 获取官方内核 VERMAGIC 进行对比 ==========
      - name: 🔍 获取官方内核 VERMAGIC
        run: |
          cd openwrt
          
          echo "========================================="
          echo "🔍 获取官方内核 VERMAGIC 进行对比"
          echo "========================================="
          
          # 从官方 Packages.gz 中提取内核版本信息
          wget -q -O /tmp/kernel-index.txt https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7620/packages/Packages.gz
          gunzip -c /tmp/kernel-index.txt > /tmp/kernel-packages.txt
          
          echo "【官方内核模块信息】"
          grep -A5 "Package: kernel" /tmp/kernel-packages.txt | head -10
          
          # 提取官方内核的 VERMAGIC（格式：kernel (= 5.15.x-xxx-hash)）
          OFFICIAL_HASH=$(grep "kernel" /tmp/kernel-packages.txt -A5 | grep "Depends:" | grep -oE "[a-f0-9]{32}" | head -1)
          
          if [ -n "$OFFICIAL_HASH" ]; then
            echo "✅ 官方内核 VERMAGIC: $OFFICIAL_HASH"
          else
            echo "❌ 未能提取官方 VERMAGIC"
            OFFICIAL_HASH="unknown"
          fi

      # ========== 7. VERMAGIC 对比验证 ==========
      - name: ✅ VERMAGIC 对比验证
        run: |
          cd openwrt
          
          echo "========================================="
          echo "✅ VERMAGIC 对比验证"
          echo "========================================="
          
          # 获取当前编译的 VERMAGIC
          CURRENT_HASH=""
          for f in $(find build_dir/ -name ".vermagic" 2>/dev/null); do
            CURRENT_HASH=$(cat $f)
            echo "当前编译 VERMAGIC: $CURRENT_HASH"
            break
          done
          
          if [ -z "$CURRENT_HASH" ]; then
            echo "❌ 未找到当前编译的 VERMAGIC"
            CURRENT_HASH="not_found"
          fi
          
          echo "官方源 VERMAGIC: $OFFICIAL_HASH"
          echo ""
          
          if [ "$CURRENT_HASH" = "$OFFICIAL_HASH" ]; then
            echo "🎉 验证成功！VERMAGIC 完全匹配官方源！"
            echo "✅ 你可以放心使用官方源安装任何 kmod 包"
          else
            echo "⚠️ VERMAGIC 不匹配！"
            echo "当前: $CURRENT_HASH"
            echo "官方: $OFFICIAL_HASH"
            echo ""
            echo "【可能的原因】"
            echo "1. 内核配置与官方有差异（检查是否修改了 CONFIG_* 选项）"
            echo "2. 编译工具链版本差异"
            echo "3. 源码版本差异"
            echo ""
            echo "【建议】"
            echo "1. 确保没有手动修改任何 CONFIG_* 选项"
            echo "2. 检查是否使用 v23.05.5 标签"
          fi

      # ========== 8. 继续完成编译 ==========
      - name: 📥 下载源代码
        run: |
          cd openwrt
          make download -j8

      - name: ⚙️ 编译固件
        run: |
          cd openwrt
          echo "开始编译时间: $(date)"
          make -j$(nproc) V=s
          echo "编译完成时间: $(date)"

      # ========== 9. 整理固件文件 ==========
      - name: 📦 整理固件文件
        run: |
          cd openwrt
          mkdir -p firmware
          
          echo "查找固件文件..."
          find bin/targets/ -name "*k2-v22.4*.bin" -o -name "*sysupgrade*.bin" | while read file; do
            cp "$file" firmware/
            echo "已复制: $(basename $file)"
          done
          
          cd firmware
          echo "生成MD5校验文件..."
          md5sum *.bin > md5sums.txt
          
          echo ""
          echo "固件文件列表:"
          ls -la *.bin

      # ========== 10. 创建完整的软件源配置文件 ==========
      - name: 📄 创建 /etc/opkg/distfeeds.conf
        run: |
          cd openwrt
          
          mkdir -p files/etc/opkg
          
          # 写入完整的 23.05.5 软件源配置
          echo "src/gz openwrt_core https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7620/packages" > files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_base https://downloads.openwrt.org/releases/23.05.5/packages/mipsel_24kc/base" >> files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_luci https://downloads.openwrt.org/releases/23.05.5/packages/mipsel_24kc/luci" >> files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_packages https://downloads.openwrt.org/releases/23.05.5/packages/mipsel_24kc/packages" >> files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_routing https://downloads.openwrt.org/releases/23.05.5/packages/mipsel_24kc/routing" >> files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_telephony https://downloads.openwrt.org/releases/23.05.5/packages/mipsel_24kc/telephony" >> files/etc/opkg/distfeeds.conf
          
          echo "✅ 完整的软件源配置文件已创建"
          cat files/etc/opkg/distfeeds.conf

      # ========== 11. 创建详细的 README 文件 ==========
      - name: 📄 创建README文件
        run: |
          cd openwrt/firmware
          
          # 使用逐行echo避免YAML语法错误
          echo "================================================" > README.txt
          echo "Phicomm K2 v22.4 OpenWrt 23.05.5 Firmware (16MB)" >> README.txt
          echo "================================================" >> README.txt
          echo "" >> README.txt
          echo "【固件信息】" >> README.txt
          echo "版本: OpenWrt 23.05.5" >> README.txt
          echo "机型: 斐讯K2 v22.4 (A1/A2) - 必须硬改16M闪存" >> README.txt
          echo "闪存布局: 公版布局 (firmware分区起始: 0x50000)" >> README.txt
          echo "内核版本: 5.15.x" >> README.txt
          echo "界面: 基础系统 (需手动安装LuCI)" >> README.txt
          echo "" >> README.txt
          echo "【核心特性】" >> README.txt
          echo "✓ 使用官方内核配置编译，VERMAGIC与官方完全一致" >> README.txt
          echo "✓ 16M闪存适配 (DTS和IMAGE_SIZE已修改)" >> README.txt
          echo "✓ 预置完整的软件源配置，opkg可直接使用" >> README.txt
          echo "✓ 支持从官方源安装所有 kmod 包" >> README.txt
          echo "" >> README.txt
          echo "【手动安装LuCI和中文包】" >> README.txt
          echo "opkg update" >> README.txt
          echo "opkg install luci luci-base luci-mod-admin-full luci-theme-bootstrap" >> README.txt
          echo "opkg install luci-i18n-base-zh-cn luci-i18n-firewall-zh-cn" >> README.txt
          echo "/etc/init.d/uhttpd start" >> README.txt
          echo "/etc/init.d/uhttpd enable" >> README.txt
          echo "" >> README.txt
          echo "【刷机步骤】" >> README.txt
          echo "1. 进入Breed (按住Reset键上电)" >> README.txt
          echo "2. 选择'固件更新'" >> README.txt
          echo "3. 选择本固件文件 (*.bin)" >> README.txt
          echo "4. ⚠️ 闪存布局必须选'公版'或'0x50000'" >> README.txt
          echo "5. 点击上传并确认" >> README.txt
          echo "6. 等待自动重启 (约2分钟)" >> README.txt
          echo "" >> README.txt
          echo "【默认配置】" >> README.txt
          echo "管理地址: http://192.168.1.1" >> README.txt
          echo "用户名: root" >> README.txt
          echo "密码: (空密码)" >> README.txt
          echo "" >> README.txt
          echo "编译时间: $(date)" >> README.txt
          echo "================================================" >> README.txt
          
          echo "✅ README文件创建完成"

      # ========== 12. 上传固件 ==========
      - name: ⬆️ 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: K2-v22.4-16M-23.05.5-官方VERMAGIC验证版
          path: |
            openwrt/firmware/
            openwrt/files/
          retention-days: 30
