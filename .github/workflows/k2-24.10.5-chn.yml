name: K2 OpenWrt 24.10.5 16M + ZeroTier + WireGuard + CHN

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 OpenWrt 24.10.5 源码
        run: |
          git clone --depth 1 -b openwrt-24.10 https://github.com/openwrt/openwrt.git
          cd openwrt
          git fetch --tags
          git checkout v24.10.5
          echo "✅ OpenWrt 24.10.5 源码下载完成"

      # ========== 修改 k2-v22.4.dts (8MB -> 16MB) ==========
      - name: 🔧 修改 mt7620a_phicomm_k2-v22.4.dts
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          
          if [ -f "$FILE" ]; then
            echo "📄 修改文件: $FILE"
            echo ""
            echo "【修改前】"
            grep -A5 "partition@50000" "$FILE"
            
            # 备份
            cp "$FILE" "${FILE}.bak"
            
            # 将 0x7b0000 (8MB) 改为 0x1fb0000 (16MB)
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            
            echo ""
            echo "【修改后】"
            grep -A5 "partition@50000" "$FILE"
            echo "✅ v22.4 修改完成"
          fi

      # ========== 修改 k2-v22.5.dts (8MB -> 16MB) ==========
      - name: 🔧 修改 mt7620a_phicomm_k2-v22.5.dts
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.5.dts"
          
          if [ -f "$FILE" ]; then
            echo "📄 修改文件: $FILE"
            echo ""
            echo "【修改前】"
            grep -A5 "partition@a0000" "$FILE"
            
            # 备份
            cp "$FILE" "${FILE}.bak"
            
            # 将 0x760000 (约7.5MB) 改为 0x1f60000 (约16MB)
            # 注意: 0xa0000 + 0x1f60000 = 0x2000000 (16MB)
            sed -i 's/reg = <0xa0000 0x760000>/reg = <0xa0000 0x1f60000>/' "$FILE"
            
            echo ""
            echo "【修改后】"
            grep -A5 "partition@a0000" "$FILE"
            echo "✅ v22.5 修改完成"
          fi

      # ========== 修改 psg1218b.dts (8MB -> 16MB) ==========
      - name: 🔧 修改 mt7620a_phicomm_psg1218b.dts
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_psg1218b.dts"
          
          if [ -f "$FILE" ]; then
            echo "📄 修改文件: $FILE"
            echo ""
            echo "【修改前】"
            grep -A5 "partition@50000" "$FILE"
            
            # 备份
            cp "$FILE" "${FILE}.bak"
            
            # 将 0x7b0000 (8MB) 改为 0x1fb0000 (16MB)
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            
            echo ""
            echo "【修改后】"
            grep -A5 "partition@50000" "$FILE"
            echo "✅ psg1218b 修改完成"
          fi

      # ========== 修改 k2g.dts (8MB -> 16MB) ==========
      - name: 🔧 修改 mt7620a_phicomm_k2g.dts
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2g.dts"
          
          if [ -f "$FILE" ]; then
            echo "📄 修改文件: $FILE"
            echo ""
            echo "【修改前】"
            grep -A5 "partition@a0000" "$FILE"
            
            # 备份
            cp "$FILE" "${FILE}.bak"
            
            # 将 0x760000 (约7.5MB) 改为 0x1f60000 (约16MB)
            sed -i 's/reg = <0xa0000 0x760000>/reg = <0xa0000 0x1f60000>/' "$FILE"
            
            echo ""
            echo "【修改后】"
            grep -A5 "partition@a0000" "$FILE"
            echo "✅ k2g 修改完成"
          fi

      # ========== 修改 Makefile 中的 IMAGE_SIZE ==========
      - name: 🔧 修改 mt7620.mk IMAGE_SIZE
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          
          if [ -f "$MK_FILE" ]; then
            echo "📄 修改文件: $MK_FILE"
            echo ""
            echo "【修改前 IMAGE_SIZE】"
            grep -E "phicomm_k2|phicomm_psg" "$MK_FILE" | grep "IMAGE_SIZE"
            
            # 备份
            cp "$MK_FILE" "${MK_FILE}.bak"
            
            # 修改 v22.4 的 IMAGE_SIZE
            sed -i '/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            
            # 修改 v22.5 的 IMAGE_SIZE
            sed -i '/phicomm_k2-v22.5/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            
            # 修改 k2g 的 IMAGE_SIZE
            sed -i '/phicomm_k2g/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            
            # 修改 psg1218b 的 IMAGE_SIZE
            sed -i '/phicomm_psg1218b/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            
            echo ""
            echo "【修改后 IMAGE_SIZE】"
            grep -E "phicomm_k2|phicomm_psg" "$MK_FILE" | grep "IMAGE_SIZE"
            echo "✅ Makefile 修改完成"
          fi

      # ========== 验证所有修改 ==========
      - name: ✅ 验证修改
        run: |
          cd openwrt
          echo "========================================="
          echo "✅ 验证所有修改"
          echo "========================================="
          
          echo "验证 v22.4:"
          grep "reg = <0x50000" target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts
          
          echo ""
          echo "验证 v22.5:"
          grep "reg = <0xa0000" target/linux/ramips/dts/mt7620a_phicomm_k2-v22.5.dts
          
          echo ""
          echo "验证 psg1218b:"
          grep "reg = <0x50000" target/linux/ramips/dts/mt7620a_phicomm_psg1218b.dts
          
          echo ""
          echo "验证 k2g:"
          grep "reg = <0xa0000" target/linux/ramips/dts/mt7620a_phicomm_k2g.dts
          
          echo ""
          echo "验证 Makefile:"
          grep -E "phicomm_k2|phicomm_psg" target/linux/ramips/image/mt7620.mk | grep "IMAGE_SIZE"

      # ========== 创建配置文件 ==========
      - name: 📝 创建配置文件
        run: |
          cd openwrt
          
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2=y" >> .config
          echo "CONFIG_TARGET_DEVICE_ramips_mt7620_DEVICE_phicomm_k2=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-firewall=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          echo "CONFIG_PACKAGE_kmod-wireguard=y" >> .config
          echo "CONFIG_PACKAGE_wireguard-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-wireguard=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-wireguard-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_zerotier=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-zerotier=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-zerotier-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt76-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt76x2=y" >> .config
          
          make defconfig

      - name: 🔄 更新feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 📥 下载源码包
        run: |
          cd openwrt
          make download -j8

      - name: ⚙️ 编译固件
        run: |
          cd openwrt
          make tools/compile -j$(nproc)
          make toolchain/compile -j$(nproc)
          make -j$(nproc) V=s

      - name: 📦 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: K2-16M-24.10.5-中文版
          path: openwrt/bin/targets/**/*.bin
          retention-days: 30
