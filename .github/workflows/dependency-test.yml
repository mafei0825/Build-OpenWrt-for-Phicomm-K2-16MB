name: K2 依赖关系试验 (仅配置 + 单包编译)

on:
  workflow_dispatch:

jobs:
  test-deps:
    runs-on: ubuntu-22.04
    timeout-minutes: 60  # 只试验依赖，时间缩短

    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 检出代码（占位）
        uses: actions/checkout@v4

      - name: 清理旧的 openwrt 目录
        run: rm -rf openwrt

      - name: 下载 OpenWrt 24.10.4 源码
        run: |
          git clone --depth 1 -b openwrt-24.10 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git fetch --tags
          git checkout v24.10.4
          echo "✅ OpenWrt 24.10.4 源码下载完成"

      # 16M闪存适配（和之前一样）
      - name: 🔧 修改 DTS (8MB -> 16MB)
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          if [ -f "$FILE" ]; then
            echo "修改前："
            grep -A5 "partition@50000" "$FILE"
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            echo "修改后："
            grep -A5 "partition@50000" "$FILE"
          else
            echo "❌ DTS 文件不存在！"
            exit 1
          fi

      - name: 🔧 修改 Makefile (IMAGE_SIZE 8MB -> 16MB)
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            echo "修改前："
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE"
            sed -i '/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            echo "修改后："
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE"
          else
            echo "❌ Makefile 不存在！"
            exit 1
          fi

      # ---------- 更新 feeds：只使用官方源，禁用第三方 ----------
      - name: 🔄 更新 feeds（仅官方源）
        run: |
          cd openwrt
          # 确保 feeds.conf.default 只包含官方源（默认应该有）
          # 如果有第三方源，注释掉它们，避免递归依赖
          sed -i '/^src-git kenzo/d' feeds.conf.default 2>/dev/null || true
          sed -i '/^src-git small/d' feeds.conf.default 2>/dev/null || true
          sed -i '/^src-git helloworld/d' feeds.conf.default 2>/dev/null || true
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "✅ 官方 feeds 更新完成"

      # ---------- 创建精简 .config（聚焦依赖试验）----------
      - name: 📝 创建 .config
        run: |
          cd openwrt

          # 基础平台
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2-v22.4=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config
          echo "CONFIG_TARGET_ARCH_PACKAGES=\"mipsel_24kc\"" >> .config

          # 必须启用的 feeds
          echo "CONFIG_FEED_luci=y" >> .config
          echo "CONFIG_FEED_packages=y" >> .config
          echo "CONFIG_FEED_routing=y" >> .config
          echo "CONFIG_FEED_telephony=y" >> .config

          # 基础库（简化版，只选必要的）
          echo "CONFIG_PACKAGE_libc=y" >> .config
          echo "CONFIG_PACKAGE_libgcc=y" >> .config
          echo "CONFIG_PACKAGE_libpthread=y" >> .config
          echo "CONFIG_PACKAGE_librt=y" >> .config
          echo "CONFIG_PACKAGE_libubox=y" >> .config
          echo "CONFIG_PACKAGE_libuci=y" >> .config
          echo "CONFIG_PACKAGE_libubus=y" >> .config
          echo "CONFIG_PACKAGE_libjson-c=y" >> .config
          echo "CONFIG_PACKAGE_libmnl=y" >> .config
          echo "CONFIG_PACKAGE_libnl-tiny=y" >> .config
          echo "CONFIG_PACKAGE_libuclient=y" >> .config
          echo "CONFIG_PACKAGE_libucode=y" >> .config
          echo "CONFIG_PACKAGE_libcurl=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_libopenssl=y" >> .config
          echo "CONFIG_PACKAGE_zlib=y" >> .config

          # Lua 和 ucode 运行时
          echo "CONFIG_PACKAGE_lua=y" >> .config
          echo "CONFIG_PACKAGE_lua5.3=y" >> .config
          echo "CONFIG_PACKAGE_libiwinfo-lua=y" >> .config

          echo "CONFIG_PACKAGE_ucode=y" >> .config
          echo "CONFIG_PACKAGE_ucode-mod-fs=y" >> .config
          echo "CONFIG_PACKAGE_ucode-mod-html=y" >> .config
          echo "CONFIG_PACKAGE_ucode-mod-math=y" >> .config
          echo "CONFIG_PACKAGE_ucode-mod-ubus=y" >> .config
          echo "CONFIG_PACKAGE_ucode-mod-uci=y" >> .config
          echo "CONFIG_PACKAGE_ucode-mod-uloop=y" >> .config

          # LuCI 基础库和核心（必须）
          echo "CONFIG_PACKAGE_liblucihttp0=y" >> .config
          echo "CONFIG_PACKAGE_liblucihttp-ucode=y" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config
          echo "CONFIG_PACKAGE_luci-mod-admin-full=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-bootstrap=y" >> .config
          echo "CONFIG_PACKAGE_luci-compat=y" >> .config

          # Web 服务器及核心服务
          echo "CONFIG_PACKAGE_uhttpd=y" >> .config
          echo "CONFIG_PACKAGE_uhttpd-mod-ubus=y" >> .config
          echo "CONFIG_PACKAGE_uhttpd-mod-lua=y" >> .config
          echo "CONFIG_PACKAGE_rpcd=y" >> .config
          echo "CONFIG_PACKAGE_rpcd-mod-luci=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config

          # 防火墙基础（可能被依赖）
          echo "CONFIG_PACKAGE_firewall4=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nf-conntrack=y" >> .config

          # ---------- 试验目标包 ----------
          echo "# 试验目标包" >> .config
          # WireGuard 协议支持（界面依赖它）
          echo "CONFIG_PACKAGE_luci-proto-wireguard=y" >> .config
          echo "CONFIG_PACKAGE_wireguard-tools=y" >> .config
          # ZeroTier
          echo "CONFIG_PACKAGE_zerotier=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-zerotier=y" >> .config
          # 自动升级
          echo "CONFIG_PACKAGE_owut=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-attendedsysupgrade=y" >> .config

          # 运行 defconfig
          make defconfig

          # 验证关键包
          echo "===== 执行 make defconfig 后 ====="
          echo "✅ .config 生成完成，正在检查关键包..."
          packages=(
            "luci-proto-wireguard"
            "wireguard-tools"
            "zerotier"
            "luci-app-zerotier"
            "owut"
            "luci-app-attendedsysupgrade"
          )
          missing=()
          for pkg in "${packages[@]}"; do
            if grep -q "CONFIG_PACKAGE_${pkg}=y" .config; then
              echo "✅ ${pkg} 已选中"
            else
              echo "❌ ${pkg} 未选中"
              missing+=("${pkg}")
            fi
          done
          if [ ${#missing[@]} -eq 0 ]; then
            echo "🎉 所有试验包均已选中！"
          else
            echo "⚠️ 以下包未选中：${missing[*]}"
          fi

      # ---------- 尝试编译单个包以暴露缺失依赖 ----------
      - name: 🔨 尝试编译 luci-proto-wireguard 以检查依赖
        run: |
          cd openwrt
          echo "尝试编译 luci-proto-wireguard ..."
          # 使用 prepare 步骤会检查依赖并下载源码，但不会完全编译
          make package/luci-proto-wireguard/prepare V=s 2>&1 | tee /tmp/wireguard-prepare.log
          echo "编译日志已保存"

      - name: 🔨 尝试编译 zerotier 以检查依赖
        run: |
          cd openwrt
          echo "尝试编译 zerotier ..."
          make package/zerotier/prepare V=s 2>&1 | tee /tmp/zerotier-prepare.log

      - name: 🔨 尝试编译 owut 以检查依赖
        run: |
          cd openwrt
          echo "尝试编译 owut ..."
          make package/owut/prepare V=s 2>&1 | tee /tmp/owut-prepare.log

      # ---------- 收集日志和配置 ----------
      - name: 📦 收集日志和 .config
        run: |
          mkdir -p logs
          cp /tmp/*.log logs/ 2>/dev/null || true
          cp openwrt/.config logs/
          tar -czf test-results.tar.gz logs/
          echo "✅ 结果已打包"

      - name: ⬆️ 上传测试结果
        uses: actions/upload-artifact@v4
        with:
          name: dependency-test-results
          path: test-results.tar.gz
          retention-days: 30
