name: K2 v22.4 OpenWrt 23.05.5 16M + chn n2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 OpenWrt 23.05.5 源码
        run: |
          git clone --depth 1 -b openwrt-23.05 https://github.com/openwrt/openwrt.git
          cd openwrt
          git fetch --tags
          git checkout v23.05.5
          echo "✅ OpenWrt 23.05.5 源码下载完成"

      # ========== 1. 16M闪存适配与修改记录查看 ==========
      - name: 🔧 修改 DTS 文件 (8MB -> 16MB) 并查看修改
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          if [ -f "$FILE" ]; then
            echo "========================================="
            echo "📄 修改前 DTS 内容:"
            echo "========================================="
            cat "$FILE"
            echo ""
            echo "【执行修改】将 0x7b0000 替换为 0x1fb0000"
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            echo ""
            echo "========================================="
            echo "📄 修改后 DTS 内容:"
            echo "========================================="
            cat "$FILE"
            echo "✅ v22.4 DTS 修改完成"
          else
            echo "❌ 文件不存在: $FILE"; exit 1
          fi

      - name: 🔧 修改 Makefile (8MB -> 16MB) 并查看修改
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            echo "========================================="
            echo "📄 修改前 Makefile 内容:"
            echo "========================================="
            cat "$MK_FILE"
            echo ""
            echo "【执行修改】将 IMAGE_SIZE 改为 16064k"
            sed -i '/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            echo ""
            echo "========================================="
            echo "📄 修改后 Makefile 内容:"
            echo "========================================="
            cat "$MK_FILE"
            echo "✅ Makefile 修改完成"
          else
            echo "❌ 文件不存在: $MK_FILE"; exit 1
          fi

      # ========== 2. 核心配置：基于你成功安装的记录 ==========
      - name: 📝 创建核心配置文件
        run: |
          cd openwrt
          
          # 基础平台
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2-v22.4=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config

          # ===== LuCI 核心模块 (基于你的安装记录) =====
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config
          echo "CONFIG_PACKAGE_luci-mod-admin-full=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-bootstrap=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-firewall=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-opkg=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-ipv6=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-ppp=y" >> .config
          echo "CONFIG_PACKAGE_luci-mod-status=y" >> .config
          echo "CONFIG_PACKAGE_luci-mod-system=y" >> .config
          echo "CONFIG_PACKAGE_luci-mod-network=y" >> .config
          echo "CONFIG_PACKAGE_luci-light=y" >> .config

          # ===== 防火墙内核模块 =====
          echo "CONFIG_PACKAGE_kmod-ipt-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ipt-conntrack=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ipt-nat=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ipt-raw=y" >> .config
          echo "CONFIG_PACKAGE_firewall=y" >> .config
          echo "CONFIG_PACKAGE_firewall4=y" >> .config

          # ===== 中文语言包 =====
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config

          # ===== 基础服务和工具 =====
          echo "CONFIG_PACKAGE_uhttpd=y" >> .config
          echo "CONFIG_PACKAGE_uhttpd-mod-ubus=y" >> .config
          echo "CONFIG_PACKAGE_rpcd=y" >> .config
          echo "CONFIG_PACKAGE_rpcd-mod-file=y" >> .config
          echo "CONFIG_PACKAGE_rpcd-mod-luci=y" >> .config
          echo "CONFIG_PACKAGE_rpcd-mod-ucode=y" >> .config
          echo "CONFIG_PACKAGE_rpcd-mod-iwinfo=y" >> .config
          echo "CONFIG_PACKAGE_rpcd-mod-rrdns=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config

          # ===== 依赖库 =====
          echo "CONFIG_PACKAGE_liblucihttp0=y" >> .config
          echo "CONFIG_PACKAGE_liblucihttp-ucode=y" >> .config
          echo "CONFIG_PACKAGE_ucode-mod-math=y" >> .config
          echo "CONFIG_PACKAGE_ucode-mod-html=y" >> .config

          # ===== 无线驱动 =====
          echo "CONFIG_PACKAGE_kmod-mt76-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt76x2=y" >> .config

          # ===== 基础工具 =====
          echo "CONFIG_PACKAGE_iperf3=y" >> .config
          echo "CONFIG_PACKAGE_tcpdump=y" >> .config
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_nano=y" >> .config

          make defconfig
          echo "✅ 配置文件创建完成"

      # ========== 3. 更新 Feeds ==========
      - name: 🔄 更新 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ========== 4. 下载源代码 ==========
      - name: 📥 下载源代码
        run: |
          cd openwrt
          make download -j8

      # ========== 5. 编译固件 ==========
      - name: ⚙️ 开始编译 (约1-2小时)
        run: |
          cd openwrt
          make -j$(nproc) V=s

      # ========== 6. 验证编译结果 ==========
      - name: ✅ 验证 LuCI 和中文包是否编译成功
        run: |
          cd openwrt
          echo "========================================="
          echo "✅ 验证编译结果"
          echo "========================================="
          
          # 查找编译出的固件中的包列表
          PACKAGE_DIR="bin/targets/ramips/mt7620/packages"
          if [ -d "$PACKAGE_DIR" ]; then
            echo "查看编译出的 LuCI 相关包:"
            ls -la $PACKAGE_DIR | grep -E "luci|i18n|zh-cn" || echo "未找到LuCI包"
            
            # 统计中文包数量
            ZH_CN_COUNT=$(ls $PACKAGE_DIR | grep "zh-cn" | wc -l 2>/dev/null || echo 0)
            echo "中文语言包数量: $ZH_CN_COUNT"
            
            if [ $ZH_CN_COUNT -gt 0 ]; then
              echo "✅ 中文语言包编译成功"
            else
              echo "❌ 中文语言包可能未编译"
            fi
          fi

      # ========== 7. 整理固件文件 ==========
      - name: 📦 整理固件文件
        run: |
          cd openwrt
          mkdir -p firmware
          
          echo "查找固件文件..."
          find bin/targets/ -name "*k2-v22.4*.bin" -o -name "*sysupgrade*.bin" | while read file; do
            cp "$file" firmware/
            echo "已复制: $(basename $file)"
          done
          
          cd firmware
          echo "生成MD5校验文件..."
          md5sum *.bin > md5sums.txt 2>/dev/null || echo "无bin文件"
          
          echo ""
          echo "固件文件列表:"
          ls -la *.bin 2>/dev/null || echo "无固件文件"

      # ========== 8. 创建README文件（使用逐行echo）==========
      - name: 📄 创建README文件
        run: |
          cd openwrt/firmware
          
          # 使用逐行echo避免YAML语法错误
          echo "================================================" > README.txt
          echo "Phicomm K2 v22.4 OpenWrt 23.05.5 Firmware (16MB)" >> README.txt
          echo "================================================" >> README.txt
          echo "" >> README.txt
          echo "【固件信息】" >> README.txt
          echo "版本: OpenWrt 23.05.5" >> README.txt
          echo "机型: 斐讯K2 v22.4 (A1/A2) - 必须硬改16M闪存" >> README.txt
          echo "闪存布局: 公版布局 (firmware分区起始: 0x50000)" >> README.txt
          echo "内核版本: 5.15.x" >> README.txt
          echo "界面: 简体中文 (默认)" >> README.txt
          echo "" >> README.txt
          echo "【已安装的LuCI组件】" >> README.txt
          echo "✓ luci (主包)" >> README.txt
          echo "✓ luci-base (基础库)" >> README.txt
          echo "✓ luci-mod-admin-full (管理界面)" >> README.txt
          echo "✓ luci-theme-bootstrap (默认主题)" >> README.txt
          echo "✓ luci-app-firewall (防火墙)" >> README.txt
          echo "✓ luci-app-opkg (软件包管理)" >> README.txt
          echo "✓ luci-proto-ipv6 (IPv6支持)" >> README.txt
          echo "✓ luci-proto-ppp (PPPoE支持)" >> README.txt
          echo "✓ luci-mod-status (状态页面)" >> README.txt
          echo "✓ luci-mod-system (系统页面)" >> README.txt
          echo "✓ luci-mod-network (网络页面)" >> README.txt
          echo "✓ luci-light (精简版)" >> README.txt
          echo "" >> README.txt
          echo "【中文语言包】" >> README.txt
          echo "✓ luci-i18n-base-zh-cn (基础中文)" >> README.txt
          echo "✓ luci-i18n-firewall-zh-cn (防火墙中文)" >> README.txt
          echo "" >> README.txt
          echo "【防火墙内核模块】" >> README.txt
          echo "✓ kmod-ipt-core" >> README.txt
          echo "✓ kmod-ipt-conntrack" >> README.txt
          echo "✓ kmod-ipt-nat" >> README.txt
          echo "✓ kmod-ipt-raw" >> README.txt
          echo "" >> README.txt
          echo "【验证说明】" >> README.txt
          echo "本固件基于你成功手动安装的记录编译，确保开箱即用中文界面。" >> README.txt
          echo "" >> README.txt
          echo "【刷机步骤】" >> README.txt
          echo "1. 进入Breed (按住Reset键上电)" >> README.txt
          echo "2. 选择'固件更新'" >> README.txt
          echo "3. 选择本固件文件 (*.bin)" >> README.txt
          echo "4. ⚠️ 闪存布局必须选'公版'或'0x50000'" >> README.txt
          echo "5. 点击上传并确认" >> README.txt
          echo "6. 等待自动重启 (约2分钟)" >> README.txt
          echo "" >> README.txt
          echo "【默认配置】" >> README.txt
          echo "管理地址: http://192.168.1.1" >> README.txt
          echo "用户名: root" >> README.txt
          echo "密码: (空密码)" >> README.txt
          echo "" >> README.txt
          echo "【验证方法】" >> README.txt
          echo "登录后可直接查看:" >> README.txt
          echo "- 系统 → 软件包 → 已安装的luci包" >> README.txt
          echo "- 系统 → 语言与风格 → 简体中文" >> README.txt
          echo "" >> README.txt
          echo "编译时间: $(date)" >> README.txt
          echo "================================================" >> README.txt
          
          echo "✅ README文件创建完成"

      # ========== 9. 上传固件 ==========
      - name: ⬆️ 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: K2-v22.4-16M-23.05.5-中文LuCI-完整版
          path: openwrt/firmware/
          retention-days: 30
