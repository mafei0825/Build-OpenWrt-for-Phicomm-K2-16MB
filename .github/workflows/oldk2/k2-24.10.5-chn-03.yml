name: K2 OpenWrt 24.10.5 16M + ZeroTier + WireGuard + chn-03 (v22.4)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 OpenWrt 24.10.5 源码
        run: |
          git clone --depth 1 -b openwrt-24.10 https://github.com/openwrt/openwrt.git
          cd openwrt
          git fetch --tags
          git checkout v24.10.5
          echo "✅ OpenWrt 24.10.5 源码下载完成"

      # ========== 1. 显示所有K2相关DTS文件 ==========
      - name: 📁 显示所有K2相关DTS文件
        run: |
          cd openwrt
          echo "========================================="
          echo "📁 所有K2相关DTS文件列表"
          echo "========================================="
          
          echo "查找包含 'k2' 的文件:"
          find target/linux/ramips/dts -name "*k2*" | sort | while read file; do
            echo "  📄 $file"
          done
          
          echo ""
          echo "查找包含 'phicomm' 的文件:"
          find target/linux/ramips/dts -name "*phicomm*" | sort | while read file; do
            echo "  📄 $file"
          done
          
          echo ""
          echo "查找 v22.4 特定文件:"
          find target/linux/ramips/dts -name "*v22.4*" | sort | while read file; do
            echo "  📄 $file"
          done

      # ========== 2. 修改 v22.4 DTS 文件 (核心修改) ==========
      - name: 🔧 修改 mt7620a_phicomm_k2-v22.4.dts (8MB -> 16MB)
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          
          if [ -f "$FILE" ]; then
            echo "========================================="
            echo "🔧 修改 v22.4 DTS 文件 (公版布局 0x50000)"
            echo "========================================="
            echo "📄 文件: $FILE"
            echo ""
            echo "═══════════════════════════════"
            echo "【修改前的内容】"
            echo "═══════════════════════════════"
            
            # 显示修改前的分区定义
            grep -A5 "partition@50000" "$FILE"
            
            # 获取原始值
            OLD_VALUE=$(grep "reg = <0x50000" "$FILE" | grep -o "0x[0-9a-f]\+" | tail -1)
            echo ""
            echo "原始firmware大小: $OLD_VALUE (8MB)"
            
            # 备份
            cp "$FILE" "${FILE}.bak"
            
            # 修改为16MB (0x1fb0000) - 公版布局起始地址 0x50000 保持不变
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            
            echo ""
            echo "═══════════════════════════════"
            echo "【修改后的内容】"
            echo "═══════════════════════════════"
            
            # 显示修改后的分区定义
            grep -A5 "partition@50000" "$FILE"
            
            # 获取新值
            NEW_VALUE=$(grep "reg = <0x50000" "$FILE" | grep -o "0x[0-9a-f]\+" | tail -1)
            echo ""
            echo "修改后firmware大小: $NEW_VALUE (16MB)"
            
            # 验证修改
            if [ "$NEW_VALUE" = "0x1fb0000" ]; then
              echo "✅ v22.4 DTS 修改成功！公版布局 0x50000 已扩展为 16MB"
            else
              echo "❌ 修改失败"
              exit 1
            fi
          else
            echo "❌ 错误: 找不到 v22.4 DTS 文件"
            echo "正在查找可用的 DTS 文件..."
            find target/linux/ramips/dts -name "*k2*" -o -name "*phicomm*" | grep -v "v22.5"
            exit 1
          fi

      # ========== 3. 修改 Makefile 中的 IMAGE_SIZE ==========
      - name: 🔧 修改 mt7620.mk IMAGE_SIZE 为16M
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          
          if [ -f "$MK_FILE" ]; then
            echo "========================================="
            echo "🔧 修改 Makefile IMAGE_SIZE 为 16MB"
            echo "========================================="
            echo "📄 文件: $MK_FILE"
            echo ""
            echo "═══════════════════════════════"
            echo "【修改前的内容】"
            echo "═══════════════════════════════"
            
            # 显示 v22.4 设备定义
            echo "--- Device/phicomm_k2-v22.4 定义 ---"
            sed -n '/define Device\/phicomm_k2-v22.4/,/endef/p' "$MK_FILE"
            
            # 获取原始 IMAGE_SIZE
            OLD_SIZE=$(sed -n '/define Device\/phicomm_k2-v22.4/,/endef/p' "$MK_FILE" | grep "IMAGE_SIZE" | grep -o "[0-9]\+k")
            echo ""
            echo "原始 IMAGE_SIZE: $OLD_SIZE"
            
            # 备份
            cp "$MK_FILE" "${MK_FILE}.bak"
            
            # 修改为 16MB (16064k) - 只修改 v22.4 版本
            sed -i '/define Device\/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            
            echo ""
            echo "═══════════════════════════════"
            echo "【修改后的内容】"
            echo "═══════════════════════════════"
            
            # 显示修改后的设备定义
            sed -n '/define Device\/phicomm_k2-v22.4/,/endef/p' "$MK_FILE"
            
            # 获取新 IMAGE_SIZE
            NEW_SIZE=$(sed -n '/define Device\/phicomm_k2-v22.4/,/endef/p' "$MK_FILE" | grep "IMAGE_SIZE" | grep -o "[0-9]\+k")
            echo ""
            echo "修改后 IMAGE_SIZE: $NEW_SIZE"
            
            # 验证修改
            if [ "$NEW_SIZE" = "16064k" ]; then
              echo "✅ v22.4 IMAGE_SIZE 修改成功！16MB"
            else
              echo "❌ 修改失败"
              exit 1
            fi
          else
            echo "❌ 错误: 找不到 mt7620.mk 文件"
            exit 1
          fi

      # ========== 4. 验证最终修改结果 ==========
      - name: ✅ 验证最终修改结果
        run: |
          cd openwrt
          echo "========================================="
          echo "✅ 验证最终修改结果 (v22.4 公版布局)"
          echo "========================================="
          
          # 验证 DTS 文件
          echo "【DTS 文件验证】"
          DTS_FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          if [ -f "$DTS_FILE" ]; then
            FINAL_DTS_VALUE=$(grep "reg = <0x50000" "$DTS_FILE" | grep -o "0x[0-9a-f]\+" | tail -1)
            echo "v22.4 firmware 大小: $FINAL_DTS_VALUE"
            if [ "$FINAL_DTS_VALUE" = "0x1fb0000" ]; then
              echo "  └─ ✅ 正确 (16MB) - 公版布局 0x50000"
            else
              echo "  └─ ❌ 错误 (应该是 0x1fb0000)"
              exit 1
            fi
          fi
          
          # 验证 Makefile
          echo ""
          echo "【Makefile 验证】"
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            FINAL_MK_SIZE=$(sed -n '/define Device\/phicomm_k2-v22.4/,/endef/p' "$MK_FILE" | grep "IMAGE_SIZE" | grep -o "[0-9]\+k")
            echo "v22.4 IMAGE_SIZE: $FINAL_MK_SIZE"
            if [ "$FINAL_MK_SIZE" = "16064k" ]; then
              echo "  └─ ✅ 正确 (16MB)"
            else
              echo "  └─ ❌ 错误 (应该是 16064k)"
              exit 1
            fi
          fi
          
          echo ""
          echo "🎉 所有 v22.4 相关修改已成功应用！"
          echo "公版布局: firmware 分区起始地址 0x50000，大小 16MB (0x1fb0000)"

      # ========== 5. 创建配置文件（只编译 v22.4 版本）==========
      - name: 📝 创建配置文件
        run: |
          cd openwrt
          
          echo "========================================="
          echo "📝 创建配置文件 (只编译 v22.4 版本)"
          echo "========================================="
          
          # 使用逐行echo避免YAML语法错误
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
          
          # 明确指定编译 v22.4 版本
          echo "CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2-v22.4=y" >> .config
          
          # 16MB闪存设置
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config
          
          # LuCI 基础
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-firewall=y" >> .config
          
          # 中文语言包
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          
          # WireGuard
          echo "CONFIG_PACKAGE_kmod-wireguard=y" >> .config
          echo "CONFIG_PACKAGE_wireguard-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-wireguard=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-wireguard-zh-cn=y" >> .config
          
          # ZeroTier
          echo "CONFIG_PACKAGE_zerotier=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-zerotier=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-zerotier-zh-cn=y" >> .config
          
          # 无线驱动
          echo "CONFIG_PACKAGE_kmod-mt76-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt76x2=y" >> .config
          
          # 基础工具
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_nano=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_wget=y" >> .config
          
          make defconfig
          
          echo ""
          echo "✅ 配置文件创建完成"
          echo "编译目标: phicomm_k2-v22.4"
          echo "中文语言包已启用"

      - name: 🔄 更新feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 📥 下载源码包
        run: |
          cd openwrt
          make download -j8

      - name: ⚙️ 编译固件
        run: |
          cd openwrt
          echo "开始编译时间: $(date)"
          echo "编译 v22.4 版本，公版布局 0x50000，16MB闪存"
          echo "编译过程可能需要1-2小时，请耐心等待..."
          
          make tools/compile -j$(nproc)
          make toolchain/compile -j$(nproc)
          make -j$(nproc) V=s
          
          echo "编译完成时间: $(date)"

      - name: 📦 整理固件文件
        run: |
          cd openwrt
          mkdir -p firmware
          
          echo "查找 v22.4 固件文件..."
          find bin/targets/ -name "*k2-v22.4*.bin" -o -name "*phicomm*k2*.bin" | while read file; do
            cp "$file" firmware/
            echo "已复制: $(basename $file)"
          done
          
          # 如果没找到特定文件，复制所有bin文件
          if [ -z "$(ls -A firmware 2>/dev/null)" ]; then
            echo "未找到特定文件，复制所有bin文件..."
            find bin/targets/ -name "*.bin" -exec cp {} firmware/ \;
          fi
          
          cd firmware
          echo "生成MD5校验文件..."
          md5sum *.bin > md5sums.txt
          
          echo ""
          echo "固件文件列表:"
          ls -la *.bin

      - name: 📄 创建README文件
        run: |
          cd openwrt/firmware
          
          echo "==========================================================" > README.txt
          echo "Phicomm K2 OpenWrt 24.10.5 Firmware (v22.4专用)" >> README.txt
          echo "==========================================================" >> README.txt
          echo "" >> README.txt
          echo "【固件信息】" >> README.txt
          echo "版本: OpenWrt 24.10.5" >> README.txt
          echo "机型: 斐讯K2 (A1/A2) - 必须硬改16M闪存" >> README.txt
          echo "闪存布局: 公版布局 (firmware分区起始地址: 0x50000)" >> README.txt
          echo "固件版本: v22.4 专用版" >> README.txt
          echo "界面: 简体中文 (默认)" >> README.txt
          echo "集成: WireGuard + ZeroTier" >> README.txt
          echo "" >> README.txt
          echo "【重要】" >> README.txt
          echo "⚠️ 本固件仅适用于硬改16M闪存的K2" >> README.txt
          echo "⚠️ 原厂8M闪存请勿刷入" >> README.txt
          echo "" >> README.txt
          echo "【刷机步骤】" >> README.txt
          echo "1. 进入Breed (按住Reset键上电)" >> README.txt
          echo "2. 选择'固件更新'" >> README.txt
          echo "3. 选择本固件文件 (*.bin)" >> README.txt
          echo "4. ⚠️ 闪存布局必须选 '公版' 或 '0x50000'" >> README.txt
          echo "5. 点击上传并确认" >> README.txt
          echo "6. 等待自动重启 (约2分钟)" >> README.txt
          echo "" >> README.txt
          echo "【默认配置】" >> README.txt
          echo "管理地址: http://192.168.1.1" >> README.txt
          echo "用户名: root" >> README.txt
          echo "密码: (空密码)" >> README.txt
          echo "" >> README.txt
          echo "编译时间: $(date)" >> README.txt
          echo "==========================================================" >> README.txt
          
          echo "✅ README文件创建完成"

      - name: ⬆️ 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: K2-16M-24.10.5-v22.4-中文版-WireGuard-ZeroTier
          path: openwrt/firmware/
          retention-days: 30
