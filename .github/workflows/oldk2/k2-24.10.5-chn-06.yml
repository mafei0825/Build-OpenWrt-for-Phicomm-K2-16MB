name: K2 v22.4 OpenWrt 24.10.5 16M + chn no6

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: е®үиЈ…зј–иҜ‘дҫқиө–
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: жЈҖеҮәд»Јз Ғ
        uses: actions/checkout@v4

      - name: дёӢиҪҪ OpenWrt 24.10.5 жәҗз Ғ
        run: |
          git clone --depth 1 -b openwrt-24.10 https://github.com/openwrt/openwrt.git
          cd openwrt
          git fetch --tags
          git checkout v24.10.5
          echo "вң… OpenWrt 24.10.5 жәҗз ҒдёӢиҪҪе®ҢжҲҗ"

      # ========== 1. дҝ®ж”№ v22.4 DTS ж–Үд»¶ (8MB -> 16MB) ==========
      - name: рҹ”§ дҝ®ж”№ mt7620a_phicomm_k2-v22.4.dts
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          
          if [ -f "$FILE" ]; then
            echo "========================================="
            echo "рҹ“„ ж–Үд»¶: $FILE"
            echo "========================================="
            echo ""
            echo "гҖҗдҝ®ж”№еүҚе…ій”®еҶ…е®№гҖ‘"
            echo "----------------"
            grep -A5 "partition@50000" "$FILE"
            
            # еӨҮд»Ҫ
            cp "$FILE" "${FILE}.bak"
            
            # е°Ҷ 0x7b0000 (8MB) ж”№дёә 0x1fb0000 (16MB)
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            
            echo ""
            echo "гҖҗдҝ®ж”№еҗҺе…ій”®еҶ…е®№гҖ‘"
            echo "----------------"
            grep -A5 "partition@50000" "$FILE"
            echo ""
            echo "рҹ“Ӣ дҝ®ж”№еҗҺе®Ңж•ҙж–Үд»¶еҶ…е®№:"
            echo "===================="
            cat "$FILE"
            echo ""
            echo "вң… v22.4 DTS дҝ®ж”№е®ҢжҲҗ"
          else
            echo "вқҢ ж–Үд»¶дёҚеӯҳеңЁ: $FILE"
            exit 1
          fi

      # ========== 2. дҝ®ж”№ Makefile дёӯ v22.4 зҡ„ IMAGE_SIZE ==========
      - name: рҹ”§ дҝ®ж”№ mt7620.mk (д»… v22.4 йғЁеҲҶ)
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          
          if [ -f "$MK_FILE" ]; then
            echo "========================================="
            echo "рҹ“„ ж–Үд»¶: $MK_FILE"
            echo "========================================="
            echo ""
            echo "гҖҗдҝ®ж”№еүҚзӣёе…ійғЁеҲҶгҖ‘"
            echo "----------------"
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE" || echo "  жңӘжүҫеҲ°"
            
            # еӨҮд»Ҫ
            cp "$MK_FILE" "${MK_FILE}.bak"
            
            # дҝ®ж”№ v22.4 зҡ„ IMAGE_SIZE дёә 16064k
            sed -i '/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            
            echo ""
            echo "гҖҗдҝ®ж”№еҗҺзӣёе…ійғЁеҲҶгҖ‘"
            echo "----------------"
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE"
            echo ""
            echo "рҹ“Ӣ дҝ®ж”№еҗҺе®Ңж•ҙ Makefile еҶ…е®№:"
            echo "============================"
            cat "$MK_FILE"
            echo ""
            echo "вң… Makefile дҝ®ж”№е®ҢжҲҗ"
          else
            echo "вқҢ ж–Үд»¶дёҚеӯҳеңЁ: $MK_FILE"
            exit 1
          fi

      # ========== 3. йӘҢиҜҒдҝ®ж”№з»“жһң ==========
      - name: вң… йӘҢиҜҒдҝ®ж”№з»“жһң
        run: |
          cd openwrt
          echo "========================================="
          echo "вң… йӘҢиҜҒдҝ®ж”№з»“жһң"
          echo "========================================="
          
          echo "гҖҗDTSж–Үд»¶йӘҢиҜҒгҖ‘"
          echo "----------------"
          DTS_FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          if [ -f "$DTS_FILE" ]; then
            DTS_VALUE=$(grep "reg = <0x50000" "$DTS_FILE" | grep -o "0x[0-9a-f]\+" | tail -1)
            echo "firmware еҲҶеҢәеӨ§е°Ҹ: $DTS_VALUE"
            if [ "$DTS_VALUE" = "0x1fb0000" ]; then
              echo "вң… жӯЈзЎ®: 16MB (0x1fb0000)"
            else
              echo "вқҢ й”ҷиҜҜ: еә”иҜҘжҳҜ 0x1fb0000"
              exit 1
            fi
          fi
          
          echo ""
          echo "гҖҗMakefileйӘҢиҜҒгҖ‘"
          echo "----------------"
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            IMG_SIZE=$(sed -n '/phicomm_k2-v22.4/,/endef/p' "$MK_FILE" | grep "IMAGE_SIZE" | head -1 | sed 's/^[[:space:]]*IMAGE_SIZE := //' | sed 's/[[:space:]]*$//')
            echo "IMAGE_SIZE: $IMG_SIZE"
            if [ "$IMG_SIZE" = "16064k" ]; then
              echo "вң… жӯЈзЎ®: 16MB (16064k)"
            else
              echo "вқҢ й”ҷиҜҜ: еә”иҜҘжҳҜ 16064kпјҢеҪ“еүҚжҳҜ $IMG_SIZE"
              exit 1
            fi
          fi

      # ========== 4. еҲӣе»әй…ҚзҪ®ж–Үд»¶пјҲе®Ңж•ҙдёӯж–ҮLuCI + йҳІзҒ«еўҷеҶ…ж ёжЁЎеқ—пјү==========
      - name: рҹ“қ еҲӣе»әй…ҚзҪ®ж–Үд»¶
        run: |
          cd openwrt
          
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2-v22.4=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config
          
          # LuCI ж ёеҝғз»„д»¶
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config
          echo "CONFIG_PACKAGE_luci-mod-admin-full=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-bootstrap=y" >> .config
          
          # йҳІзҒ«еўҷеә”з”ЁеұӮ
          echo "CONFIG_PACKAGE_luci-app-firewall=y" >> .config
          echo "CONFIG_PACKAGE_firewall=y" >> .config
          echo "CONFIG_PACKAGE_firewall4=y" >> .config
          
          # ===== е…ій”®дҝ®еӨҚпјҡж·»еҠ йҳІзҒ«еўҷеҶ…ж ёжЁЎеқ—дҫқиө– =====
          echo "CONFIG_PACKAGE_kmod-ipt-core=y" >> .config      # iptables ж ёеҝғжЁЎеқ—
          echo "CONFIG_PACKAGE_kmod-ipt-conntrack=y" >> .config # иҝһжҺҘи·ҹиёӘжЁЎеқ—
          echo "CONFIG_PACKAGE_kmod-ipt-nat=y" >> .config       # NAT жЁЎеқ—
          echo "CONFIG_PACKAGE_kmod-ipt-raw=y" >> .config       # RAW иЎЁпјҲеҸҜйҖүпјү
          echo "CONFIG_PACKAGE_kmod-ipt-extra=y" >> .config     # жү©еұ•жЁЎеқ—пјҲеҸҜйҖүпјү
          # ==========================================
          
          # дёӯж–ҮиҜӯиЁҖеҢ…
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          
          # uHTTPd Web жңҚеҠЎеҷЁ
          echo "CONFIG_PACKAGE_uhttpd=y" >> .config
          echo "CONFIG_PACKAGE_uhttpd-mod-ubus=y" >> .config
          
          # ж— зәҝй©ұеҠЁ
          echo "CONFIG_PACKAGE_kmod-mt76-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt76x2=y" >> .config
          
          # еҹәзЎҖзҪ‘з»ңе·Ҙе…·
          echo "CONFIG_PACKAGE_iperf3=y" >> .config
          echo "CONFIG_PACKAGE_tcpdump=y" >> .config
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_nano=y" >> .config
          
          make defconfig
          echo "вң… й…ҚзҪ®ж–Үд»¶еҲӣе»әе®ҢжҲҗпјҲе·ІеҢ…еҗ«йҳІзҒ«еўҷеҶ…ж ёжЁЎеқ—пјү"

      # ========== 5. еҲӣе»әиҪҜд»¶жәҗй…ҚзҪ®ж–Үд»¶ ==========
      - name: рҹ“„ еҲӣе»ә /etc/opkg/distfeeds.conf
        run: |
          cd openwrt
          
          mkdir -p files/etc/opkg
          
          echo "src/gz openwrt_core https://downloads.openwrt.org/releases/24.10.5/targets/ramips/mt7620/packages" > files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_base https://downloads.openwrt.org/releases/24.10.5/packages/mipsel_24kc/base" >> files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_luci https://downloads.openwrt.org/releases/24.10.5/packages/mipsel_24kc/luci" >> files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_packages https://downloads.openwrt.org/releases/24.10.5/packages/mipsel_24kc/packages" >> files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_routing https://downloads.openwrt.org/releases/24.10.5/packages/mipsel_24kc/routing" >> files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_telephony https://downloads.openwrt.org/releases/24.10.5/packages/mipsel_24kc/telephony" >> files/etc/opkg/distfeeds.conf
          
          echo "вң… иҪҜд»¶жәҗй…ҚзҪ®ж–Үд»¶е·ІеҲӣе»ә"

      # ========== 6. жӣҙж–°feeds ==========
      - name: рҹ”„ жӣҙж–°feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ========== 7. дёӢиҪҪжәҗз ҒеҢ… ==========
      - name: рҹ“Ҙ дёӢиҪҪжәҗз ҒеҢ…
        run: |
          cd openwrt
          make download -j8

      # ========== 8. зј–иҜ‘еӣәд»¶ ==========
      - name: вҡҷпёҸ зј–иҜ‘еӣәд»¶
        run: |
          cd openwrt
          echo "ејҖе§Ӣзј–иҜ‘ж—¶й—ҙ: $(date)"
          echo "зј–иҜ‘иҝҮзЁӢеҸҜиғҪйңҖиҰҒ1-2е°Ҹж—¶пјҢиҜ·иҖҗеҝғзӯүеҫ…..."
          
          make tools/compile -j$(nproc)
          make toolchain/compile -j$(nproc)
          make -j$(nproc) V=s
          
          echo "зј–иҜ‘е®ҢжҲҗж—¶й—ҙ: $(date)"

      # ========== 9. ж•ҙзҗҶеӣәд»¶ж–Үд»¶ ==========
      - name: рҹ“Ұ ж•ҙзҗҶеӣәд»¶ж–Үд»¶
        run: |
          cd openwrt
          mkdir -p firmware
          
          echo "жҹҘжүҫеӣәд»¶ж–Үд»¶..."
          find bin/targets/ -name "*k2-v22.4*.bin" | while read file; do
            cp "$file" firmware/
            echo "е·ІеӨҚеҲ¶: $(basename $file)"
          done
          
          cd firmware
          echo "з”ҹжҲҗMD5ж ЎйӘҢж–Үд»¶..."
          md5sum *.bin > md5sums.txt
          
          echo ""
          echo "еӣәд»¶ж–Үд»¶еҲ—иЎЁ:"
          ls -la *.bin

      # ========== 10. еҲӣе»әREADMEж–Үд»¶ ==========
      - name: рҹ“„ еҲӣе»әREADMEж–Үд»¶
        run: |
          cd openwrt/firmware
          
          echo "================================================" > README.txt
          echo "Phicomm K2 v22.4 OpenWrt 24.10.5 Firmware (16MB)" >> README.txt
          echo "================================================" >> README.txt
          echo "" >> README.txt
          echo "гҖҗеӣәд»¶дҝЎжҒҜгҖ‘" >> README.txt
          echo "зүҲжң¬: OpenWrt 24.10.5" >> README.txt
          echo "жңәеһӢ: ж–җи®ҜK2 v22.4 (A1/A2) - еҝ…йЎ»зЎ¬ж”№16Mй—Әеӯҳ" >> README.txt
          echo "й—ӘеӯҳеёғеұҖ: е…¬зүҲеёғеұҖ (firmwareеҲҶеҢәиө·е§Ӣ: 0x50000)" >> README.txt
          echo "з•Ңйқў: з®ҖдҪ“дёӯж–Ү (й»ҳи®Ө)" >> README.txt
          echo "" >> README.txt
          echo "гҖҗе·Іе®үиЈ…зҡ„дёӯж–ҮиҜӯиЁҖеҢ…гҖ‘" >> README.txt
          echo "- luci-i18n-base-zh-cn" >> README.txt
          echo "- luci-i18n-firewall-zh-cn" >> README.txt
          echo "- luci-i18n-opkg-zh-cn" >> README.txt
          echo "" >> README.txt
          echo "гҖҗйў„иЈ…иҪҜд»¶жәҗй…ҚзҪ®гҖ‘" >> README.txt
          echo "еӣәд»¶е·Ійў„зҪ®е®Ңж•ҙзҡ„24.10.5е®ҳж–№иҪҜд»¶жәҗпјҢеҸҜзӣҙжҺҘиҝҗиЎҢ:" >> README.txt
          echo "  opkg update" >> README.txt
          echo "" >> README.txt
          echo "гҖҗеҲ·жңәжӯҘйӘӨгҖ‘" >> README.txt
          echo "1. иҝӣе…ҘBreed (жҢүдҪҸResetй”®дёҠз”ө)" >> README.txt
          echo "2. йҖүжӢ©'еӣәд»¶жӣҙж–°'" >> README.txt
          echo "3. йҖүжӢ©жң¬еӣәд»¶ж–Үд»¶ (*.bin)" >> README.txt
          echo "4. вҡ пёҸ й—ӘеӯҳеёғеұҖеҝ…йЎ»йҖү'е…¬зүҲ'жҲ–'0x50000'" >> README.txt
          echo "5. зӮ№еҮ»дёҠдј е№¶зЎ®и®Ө" >> README.txt
          echo "6. зӯүеҫ…иҮӘеҠЁйҮҚеҗҜ (зәҰ2еҲҶй’ҹ)" >> README.txt
          echo "" >> README.txt
          echo "гҖҗй»ҳи®Өй…ҚзҪ®гҖ‘" >> README.txt
          echo "з®ЎзҗҶең°еқҖ: http://192.168.1.1" >> README.txt
          echo "з”ЁжҲ·еҗҚ: root" >> README.txt
          echo "еҜҶз Ғ: (з©әеҜҶз Ғ)" >> README.txt
          echo "" >> README.txt
          echo "зј–иҜ‘ж—¶й—ҙ: $(date)" >> README.txt
          echo "================================================" >> README.txt
          
          echo "вң… READMEж–Үд»¶еҲӣе»әе®ҢжҲҗ"

      # ========== 11. дёҠдј еӣәд»¶ ==========
      - name: в¬ҶпёҸ дёҠдј еӣәд»¶
        uses: actions/upload-artifact@v4
        with:
          name: K2-v22.4-16M-24.10.5-дёӯж–ҮLuCI-е®Ңж•ҙйҳІзҒ«еўҷ
          path: |
            openwrt/firmware/
            openwrt/files/
          retention-days: 30
