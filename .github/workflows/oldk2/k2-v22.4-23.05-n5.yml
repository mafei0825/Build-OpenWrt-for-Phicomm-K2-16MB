name: K2 v22.4 OpenWrt 23.05.5 16M - n5
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 OpenWrt 23.05.5 源码
        run: |
          git clone --depth 1 -b openwrt-23.05 https://github.com/openwrt/openwrt.git
          cd openwrt
          git fetch --tags
          git checkout v23.05.5
          echo "✅ OpenWrt 23.05.5 源码下载完成"

      # ========== 关键步骤：下载官方内核配置覆盖 ==========
      - name: 📥 下载官方内核配置并覆盖
        run: |
          cd openwrt
          
          # 下载官方内核配置文件（5.15内核）
          wget -O target/linux/ramips/mt7620/config-5.15 \
          https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7620/config-5.15
          
          echo "✅ 官方内核配置已下载"
          echo "内核配置预览（前20行）:"
          head -20 target/linux/ramips/mt7620/config-5.15
          
          # 验证文件是否存在
          if [ -f "target/linux/ramips/mt7620/config-5.15" ]; then
            echo "✅ 内核配置覆盖成功"
          else
            echo "❌ 内核配置下载失败"
            exit 1
          fi

      # ========== 1. 修改 DTS 文件 (8MB -> 16MB) ==========
      - name: 🔧 修改 mt7620a_phicomm_k2-v22.4.dts
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          
          if [ -f "$FILE" ]; then
            echo "========================================="
            echo "📄 修改前 DTS 内容:"
            echo "========================================="
            cat "$FILE"
            echo ""
            echo "【执行修改】将 0x7b0000 替换为 0x1fb0000"
            
            # 备份原文件
            cp "$FILE" "${FILE}.bak"
            
            # 将 8MB 分区大小改为 16MB
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            
            echo ""
            echo "========================================="
            echo "📄 修改后 DTS 内容:"
            echo "========================================="
            cat "$FILE"
            echo "✅ v22.4 DTS 修改完成"
          else
            echo "❌ 文件不存在: $FILE"
            exit 1
          fi

      # ========== 2. 修改 Makefile 中的 IMAGE_SIZE ==========
      - name: 🔧 修改 mt7620.mk (8MB -> 16MB)
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          
          if [ -f "$MK_FILE" ]; then
            echo "========================================="
            echo "📄 修改前 Makefile 内容:"
            echo "========================================="
            cat "$MK_FILE"
            echo ""
            echo "【执行修改】将 IMAGE_SIZE 改为 16064k"
            
            # 备份原文件
            cp "$MK_FILE" "${MK_FILE}.bak"
            
            # 修改 v22.4 的 IMAGE_SIZE 为 16064k
            sed -i '/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            
            echo ""
            echo "========================================="
            echo "📄 修改后 Makefile 内容:"
            echo "========================================="
            cat "$MK_FILE"
            echo "✅ Makefile 修改完成"
          else
            echo "❌ 文件不存在: $MK_FILE"
            exit 1
          fi

      # ========== 3. 验证修改结果 ==========
      - name: ✅ 验证修改结果
        run: |
          cd openwrt
          echo "========================================="
          echo "✅ 验证修改结果"
          echo "========================================="
          
          echo "【DTS文件验证】"
          echo "----------------"
          DTS_FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          if [ -f "$DTS_FILE" ]; then
            DTS_VALUE=$(grep "reg = <0x50000" "$DTS_FILE" | grep -o "0x[0-9a-f]\+" | tail -1)
            echo "firmware 分区大小: $DTS_VALUE"
            if [ "$DTS_VALUE" = "0x1fb0000" ]; then
              echo "✅ 正确: 16MB (0x1fb0000)"
            else
              echo "❌ 错误: 应该是 0x1fb0000"
              exit 1
            fi
          fi
          
          echo ""
          echo "【Makefile验证】"
          echo "----------------"
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            IMG_SIZE=$(sed -n '/phicomm_k2-v22.4/,/endef/p' "$MK_FILE" | grep "IMAGE_SIZE" | head -1 | sed 's/^[[:space:]]*IMAGE_SIZE := //' | sed 's/[[:space:]]*$//')
            echo "IMAGE_SIZE: $IMG_SIZE"
            if [ "$IMG_SIZE" = "16064k" ]; then
              echo "✅ 正确: 16MB (16064k)"
            else
              echo "❌ 错误: 应该是 16064k，当前是 $IMG_SIZE"
              exit 1
            fi
          fi

      # ========== 4. 创建配置文件（基础版，不包含LuCI）==========
      - name: 📝 创建配置文件
        run: |
          cd openwrt
          
          # 使用逐行echo创建配置文件
          echo "# 目标平台" > .config
          echo "CONFIG_TARGET_ramips=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2-v22.4=y" >> .config
          echo "" >> .config
          
          echo "# 16M闪存" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config
          echo "" >> .config
          
          # 不添加LuCI相关包，只编译基础系统
          
          # 运行defconfig补全依赖
          make defconfig
          
          # 验证配置
          echo "✅ 配置文件创建完成，包含以下设备:"
          grep "CONFIG_TARGET_DEVICE_ramips_mt7620_DEVICE_" .config | grep "=y" || echo "无设备配置"

      # ========== 5. 更新 Feeds ==========
      - name: 🔄 更新 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ========== 6. 下载源代码 ==========
      - name: 📥 下载源代码
        run: |
          cd openwrt
          make download -j8

      # ========== 7. 编译固件 ==========
      - name: ⚙️ 编译固件
        run: |
          cd openwrt
          echo "开始编译时间: $(date)"
          echo "使用官方内核配置，16M闪存适配..."
          make -j$(nproc) V=s
          echo "编译完成时间: $(date)"

      # ========== 8. 整理固件文件 ==========
      - name: 📦 整理固件文件
        run: |
          cd openwrt
          mkdir -p firmware
          
          echo "查找固件文件..."
          find bin/targets/ -name "*k2-v22.4*.bin" -o -name "*sysupgrade*.bin" | while read file; do
            cp "$file" firmware/
            echo "已复制: $(basename $file)"
          done
          
          cd firmware
          echo "生成MD5校验文件..."
          md5sum *.bin > md5sums.txt 2>/dev/null || echo "无bin文件"
          
          echo ""
          echo "固件文件列表:"
          ls -la *.bin 2>/dev/null || echo "无固件文件"

      # ========== 9. 上传固件 ==========
      - name: ⬆️ 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: K2-v22.4-16M-23.05.5-官方内核配置-基础版
          path: openwrt/firmware/
          retention-days: 30
