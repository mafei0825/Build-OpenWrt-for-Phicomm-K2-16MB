name: K2 v22.4 OpenWrt 23.05.5 16M n6

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 OpenWrt 23.05.5 源码
        run: |
          git clone --depth 1 -b openwrt-23.05 https://github.com/openwrt/openwrt.git
          cd openwrt
          git fetch --tags
          git checkout v23.05.5

      # ========== 1. 16M闪存适配 - 修改DTS ==========
      - name: 🔧 修改 DTS 文件 (8MB -> 16MB)
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          if [ -f "$FILE" ]; then
            echo "修改前:"
            grep "reg = <0x50000" "$FILE"
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            echo "修改后:"
            grep "reg = <0x50000" "$FILE"
          fi

      # ========== 2. 16M闪存适配 - 修改Makefile ==========
      - name: 🔧 修改 Makefile (8MB -> 16MB)
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            echo "修改前:"
            grep "phicomm_k2-v22.4" -A5 "$MK_FILE" | grep "IMAGE_SIZE"
            sed -i '/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            echo "修改后:"
            grep "phicomm_k2-v22.4" -A5 "$MK_FILE" | grep "IMAGE_SIZE"
          fi

      # ========== 3. 创建配置文件 ==========
      - name: 📝 创建配置文件
        run: |
          cd openwrt
          
          # 下载官方配置
          wget -q -O .config.full \
          https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7620/config.buildinfo
          
          # 只保留K2 v22.4
          grep -v "CONFIG_TARGET_DEVICE_ramips_mt7620_DEVICE_" .config.full | \
          grep -v "CONFIG_TARGET_DEVICE_PACKAGES_" > .config
          
          # 添加K2 v22.4
          echo "CONFIG_TARGET_DEVICE_ramips_mt7620_DEVICE_phicomm_k2-v22.4=y" >> .config
          
          # 16M闪存
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config
          
          make defconfig
          
          echo "设备列表:"
          grep "CONFIG_TARGET_DEVICE_.*=y" .config

      - name: 🔄 更新 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 📥 下载源代码
        run: |
          cd openwrt
          make download -j8

      - name: ⚙️ 编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 📦 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: K2-v22.4-16M-23.05.5
          path: openwrt/bin/targets/**/*.bin
