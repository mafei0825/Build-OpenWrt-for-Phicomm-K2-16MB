name: K2_DTS_MAKEFILE_CONFIG_IPK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 检出代码
        uses: actions/checkout@v4

      # ========== 清理旧的 openwrt 目录 ==========
      - name: 清理旧的 openwrt 目录
        run: rm -rf openwrt

      - name: 下载 OpenWrt 23.05.5 源码
        run: |
          git clone --depth 1 -b openwrt-23.05 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git fetch --tags
          git checkout v23.05.5
          echo "✅ OpenWrt 23.05.5 源码下载完成"

      # ========== 1. 16M闪存适配：修改 DTS ==========
      - name: 🔧 修改 DTS (8MB -> 16MB)
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          if [ -f "$FILE" ]; then
            echo "修改前 DTS 分区大小："
            grep "reg = <0x50000" "$FILE" || echo "未找到"
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            echo "修改后 DTS 分区大小："
            grep "reg = <0x50000" "$FILE"
            echo "✅ DTS 修改完成"
          else
            echo "❌ DTS 文件不存在！退出。"
            exit 1
          fi

      # ========== 2. 16M闪存适配：修改 Makefile ==========
      - name: 🔧 修改 Makefile (IMAGE_SIZE 8MB -> 16MB)
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            echo "修改前 IMAGE_SIZE："
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE" || echo "未找到"
            sed -i '/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            echo "修改后 IMAGE_SIZE："
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE"
            echo "✅ Makefile 修改完成"
          else
            echo "❌ Makefile 不存在！退出。"
            exit 1
          fi

      # ========== 3. 创建基础 .config ==========
      - name: 📝 创建 .config
        run: |
          cd openwrt
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2-v22.4=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config
          make defconfig
          echo "✅ .config 生成完成"
          grep "phicomm_k2-v22.4" .config || true

      # ========== 4. 打包源码包（在编译前保存）==========
      - name: 📦 打包修改后的源码目录
        run: |
          tar -czf openwrt-k2-source.tar.gz -C ${{ github.workspace }} openwrt
          echo "✅ 源码目录打包完成：openwrt-k2-source.tar.gz"

      # ========== 5. 创建输出目录并整理文件 ==========
      - name: 📁 整理输出文件
        run: |
          # 创建输出目录
          mkdir -p output/source-package
          mkdir -p output/firmware
          
          # 复制关键文件到输出目录
          cp openwrt/.config output/source-package/
          cp openwrt/target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts output/source-package/
          cp openwrt/target/linux/ramips/image/mt7620.mk output/source-package/
          
          # 将源码包复制到输出目录
          cp ${{ github.workspace }}/openwrt-k2-source.tar.gz output/
          
          # ===== 使用逐行echo创建README =====
          echo "================================================" > output/README.txt
          echo "K2 OpenWrt 源码包 + 固件说明" >> output/README.txt
          echo "================================================" >> output/README.txt
          echo "" >> output/README.txt
          echo "【文件列表】" >> output/README.txt
          echo "------------------------" >> output/README.txt
          echo "- firmware/           # 编译好的固件文件" >> output/README.txt
          echo "- source-package/      # 修改后的关键源码文件" >> output/README.txt
          echo "- openwrt-k2-source.tar.gz  # 完整的OpenWrt源码包" >> output/README.txt
          echo "" >> output/README.txt
          echo "【source-package 内容】" >> output/README.txt
          echo "- .config                  # 编译配置文件" >> output/README.txt
          echo "- mt7620a_phicomm_k2-v22.4.dts  # 修改后的DTS文件（16M闪存）" >> output/README.txt
          echo "- mt7620.mk                 # 修改后的Makefile（IMAGE_SIZE=16064k）" >> output/README.txt
          echo "" >> output/README.txt
          echo "【固件信息】" >> output/README.txt
          echo "- 目标平台：K2 v22.4" >> output/README.txt
          echo "- 闪存大小：16MB (已适配)" >> output/README.txt
          echo "- 内核版本：5.15" >> output/README.txt
          echo "- 基础系统：不含LuCI等额外软件包" >> output/README.txt
          echo "" >> output/README.txt
          echo "【使用方法】" >> output/README.txt
          echo "1. 固件：在Breed中刷入 firmware/*.bin 文件" >> output/README.txt
          echo "2. 源码：解压 openwrt-k2-source.tar.gz 得到完整源码" >> output/README.txt
          echo "3. 单独文件：source-package 中的文件可替换到你的OpenWrt源码中" >> output/README.txt
          echo "================================================" >> output/README.txt
          
          echo "✅ 文件整理完成，输出目录内容："
          ls -la output/

      # ========== 6. 更新 feeds ==========
      - name: 🔄 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ========== 7. 下载源代码包 ==========
      - name: 📥 下载源代码
        run: |
          cd openwrt
          make download -j8

      # ========== 8. 编译固件 ==========
      - name: ⚙️ 编译固件
        run: |
          cd openwrt
          echo "开始编译时间: $(date)"
          make -j$(nproc) V=s
          echo "编译完成时间: $(date)"

      # ========== 9. 整理固件文件到输出目录 ==========
      - name: 📦 整理固件到输出目录
        run: |
          cd openwrt
          # 将编译好的固件复制到 output/firmware 目录
          find bin/targets/ -name "*.bin" -exec cp {} ${{ github.workspace }}/output/firmware/ \;
          cd ${{ github.workspace }}/output/firmware
          md5sum *.bin > md5sums.txt
          echo "固件列表："
          ls -la

      # ========== 10. 上传整个 output 目录到 Actions Artifacts ==========
      - name: ⬆️ 上传打包好的文件
        uses: actions/upload-artifact@v4
        with:
          name: K2-v22.4-16M-源码包+固件
          path: output/
          retention-days: 30
          if-no-files-found: error
