name: K2_DTS_MAKEFILE_CONFIG_IPK_TO_OPENWRT

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 检出代码
        uses: actions/checkout@v4

      # ========== 清理旧的 openwrt 目录 ==========
      - name: 清理旧的 openwrt 目录
        run: rm -rf openwrt

      - name: 下载 OpenWrt 23.05.5 源码
        run: |
          git clone --depth 1 -b openwrt-23.05 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git fetch --tags
          git checkout v23.05.5
          echo "✅ OpenWrt 23.05.5 源码下载完成"

      # ========== 1. 16M闪存适配：修改 DTS ==========
      - name: 🔧 修改 DTS (8MB -> 16MB)
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          if [ -f "$FILE" ]; then
            echo "修改前 DTS 分区大小："
            grep "reg = <0x50000" "$FILE" || echo "未找到"
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            echo "修改后 DTS 分区大小："
            grep "reg = <0x50000" "$FILE"
            echo "✅ DTS 修改完成"
          else
            echo "❌ DTS 文件不存在！退出。"
            exit 1
          fi

      # ========== 2. 16M闪存适配：修改 Makefile ==========
      - name: 🔧 修改 Makefile (IMAGE_SIZE 8MB -> 16MB)
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            echo "修改前 IMAGE_SIZE："
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE" || echo "未找到"
            sed -i '/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            echo "修改后 IMAGE_SIZE："
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE"
            echo "✅ Makefile 修改完成"
          else
            echo "❌ Makefile 不存在！退出。"
            exit 1
          fi

      # ========== 3. 创建基础 .config ==========
      - name: 📝 创建 .config
        run: |
          cd openwrt
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2-v22.4=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config
          make defconfig
          echo "✅ .config 生成完成"
          grep "phicomm_k2-v22.4" .config || true

      # ========== 4. 配置 Git 并推送配置文件到目标仓库 ==========
      - name: ⚙️ 配置 Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 📤 推送配置文件到目标仓库
        env:
          K2_DTS_MAKEFILE_CONFIG_IPK: ${{ secrets.K2_DTS_MAKEFILE_CONFIG_IPK }}
        run: |
          # 清理旧的 target-repo 目录
          rm -rf target-repo
          
          # 使用 PAT 克隆目标仓库
          git clone https://oauth2:${K2_DTS_MAKEFILE_CONFIG_IPK}@github.com/mafei0825/k2-openwrt-builder.git target-repo
          cd target-repo
          
          # 创建或清空 config-files 目录
          mkdir -p config-files
          rm -rf config-files/*
          
          # 推送关键配置文件（不推送大文件）
          cp ${{ github.workspace }}/openwrt/.config config-files/
          cp ${{ github.workspace }}/openwrt/target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts config-files/
          cp ${{ github.workspace }}/openwrt/target/linux/ramips/image/mt7620.mk config-files/
          
          # 创建 README 说明文件
          echo "================================================" > config-files/README.txt
          echo "K2 OpenWrt 配置文件说明" >> config-files/README.txt
          echo "================================================" >> config-files/README.txt
          echo "" >> config-files/README.txt
          echo "文件列表：" >> config-files/README.txt
          echo "- .config                  # 编译配置文件" >> config-files/README.txt
          echo "- mt7620a_phicomm_k2-v22.4.dts  # 修改后的DTS文件（16M闪存）" >> config-files/README.txt
          echo "- mt7620.mk                 # 修改后的Makefile（IMAGE_SIZE=16064k）" >> config-files/README.txt
          echo "" >> config-files/README.txt
          echo "使用方法：" >> config-files/README.txt
          echo "1. 将这些文件复制到 OpenWrt 源码对应目录" >> config-files/README.txt
          echo "2. 完整固件请从 Actions 下载" >> config-files/README.txt
          echo "================================================" >> config-files/README.txt
          
          # 添加所有更改
          git add config-files/
          
          # 提交更改
          git diff --quiet && git diff --staged --quiet || git commit -m "更新 K2 OpenWrt 配置文件 - $(date +'%Y-%m-%d %H:%M:%S')"
          
          # 推送到 main 分支
          git push https://oauth2:${K2_DTS_MAKEFILE_CONFIG_IPK}@github.com/mafei0825/k2-openwrt-builder.git main

      # ========== 5. 更新 feeds ==========
      - name: 🔄 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ========== 6. 下载源代码包 ==========
      - name: 📥 下载源代码
        run: |
          cd openwrt
          make download -j8

      # ========== 7. 编译固件 ==========
      - name: ⚙️ 编译固件
        run: |
          cd openwrt
          echo "开始编译时间: $(date)"
          make -j$(nproc) V=s
          echo "编译完成时间: $(date)"

      # ========== 8. 整理固件文件 ==========
      - name: 📦 整理固件
        run: |
          cd openwrt
          mkdir -p firmware
          find bin/targets/ -name "*.bin" -exec cp {} firmware/ \;
          cd firmware
          md5sum *.bin > md5sums.txt
          echo "固件列表："
          ls -la

      # ========== 9. 上传固件到 Actions Artifacts ==========
      - name: ⬆️ 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: K2-v22.4-16M-23.05.5-基础系统
          path: openwrt/firmware/
          retention-days: 30
