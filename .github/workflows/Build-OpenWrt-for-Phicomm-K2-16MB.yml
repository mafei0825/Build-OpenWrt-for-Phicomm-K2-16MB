name: K2_DTS_MAKEFILE_CONFIG_IPK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60  # 不需要编译固件，时间缩短

    steps:
      - name: 安装基础依赖
        run: |
          sudo apt update
          sudo apt install -y git wget

      - name: 检出代码（仅用于占位）
        uses: actions/checkout@v4

      # ========== 清理旧的 openwrt 目录 ==========
      - name: 清理旧的 openwrt 目录
        run: rm -rf openwrt

      - name: 下载 OpenWrt 23.05.5 源码
        run: |
          git clone --depth 1 -b openwrt-23.05 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git fetch --tags
          git checkout v23.05.5
          echo "✅ OpenWrt 23.05.5 源码下载完成"

      # ========== 1. 16M闪存适配：修改 DTS ==========
      - name: 🔧 修改 DTS (8MB -> 16MB)
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          if [ -f "$FILE" ]; then
            echo "修改前 DTS 分区大小："
            grep "reg = <0x50000" "$FILE" || echo "未找到"
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            echo "修改后 DTS 分区大小："
            grep "reg = <0x50000" "$FILE"
            echo "✅ DTS 修改完成"
          else
            echo "❌ DTS 文件不存在！退出。"
            exit 1
          fi

      # ========== 2. 16M闪存适配：修改 Makefile ==========
      - name: 🔧 修改 Makefile (IMAGE_SIZE 8MB -> 16MB)
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            echo "修改前 IMAGE_SIZE："
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE" || echo "未找到"
            sed -i '/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            echo "修改后 IMAGE_SIZE："
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE"
            echo "✅ Makefile 修改完成"
          else
            echo "❌ Makefile 不存在！退出。"
            exit 1
          fi

      # ========== 3. 创建基础 .config ==========
      - name: 📝 创建 .config
        run: |
          cd openwrt
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2-v22.4=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config
          make defconfig
          echo "✅ .config 生成完成"
          grep "phicomm_k2-v22.4" .config || true

      # ========== 4. 创建输出目录并整理文件 ==========
      - name: 📁 整理输出文件
        run: |
          # 创建输出目录
          mkdir -p output/source-package
          
          # 复制关键文件到输出目录
          cp openwrt/.config output/source-package/
          cp openwrt/target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts output/source-package/
          cp openwrt/target/linux/ramips/image/mt7620.mk output/source-package/
          
          # 打包完整的源码目录（可选，如果你需要完整源码）
          tar -czf output/openwrt-full-source.tar.gz -C ${{ github.workspace }} openwrt
          
          # 创建说明文件
          cat > output/README.txt << 'EOF'
================================================
K2 OpenWrt 源码包说明
================================================

文件列表：
- source-package/.config                  # 编译配置文件
- source-package/mt7620a_phicomm_k2-v22.4.dts  # 修改后的DTS文件（16M闪存）
- source-package/mt7620.mk                 # 修改后的Makefile（IMAGE_SIZE=16064k）
- openwrt-full-source.tar.gz               # 完整的OpenWrt源码（包含所有修改）

使用方法：
1. 解压 openwrt-full-source.tar.gz 得到完整源码
2. 或者只使用 source-package 中的文件替换到你的OpenWrt源码中

编译说明：
- 目标平台：K2 v22.4
- 闪存大小：16MB (已适配)
- 内核版本：5.15
================================================
EOF
          
          echo "✅ 文件整理完成，输出目录内容："
          ls -la output/

      # ========== 5. 上传整个 output 目录到 Actions Artifacts ==========
      - name: ⬆️ 上传打包好的文件
        uses: actions/upload-artifact@v4
        with:
          name: K2-openwrt-source-package
          path: output/
          retention-days: 30
          if-no-files-found: error
