name: Build K2 OpenWrt 24.10.5 Chinese UI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWrt version'
        required: true
        default: '24.10.5'
        type: choice
        options:
          - '24.10.5'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OpenWrt 24.10.5 source
        run: |
          git clone --depth 1 -b openwrt-24.10 https://github.com/openwrt/openwrt.git
          cd openwrt
          git fetch --tags
          git checkout v24.10.5

      - name: Debug DTS files
        run: |
          cd openwrt
          echo "Listing all DTS files:"
          find target/linux/ramips/dts -name "*.dts" | head -20

      - name: Modify for 16MB
        run: |
          cd openwrt
          
          # Try to find K2 DTS file
          DTS_FILE=$(find target/linux/ramips/dts -name "*k2*.dts" -o -name "*phicomm*.dts" | head -1)
          
          if [ -f "$DTS_FILE" ]; then
            echo "Found DTS: $DTS_FILE"
            sed -i 's/reg = <0x50000 0xfb0000>/reg = <0x50000 0x1fb0000>/' "$DTS_FILE"
          fi
          
          # Always modify Makefile
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            sed -i '/define Device\/phicomm_k2/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
          fi

      - name: Create config
        run: |
          cd openwrt
          # 使用逐行echo，避免多行字符串语法问题
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2=y" >> .config
          echo "CONFIG_TARGET_DEVICE_ramips_mt7620_DEVICE_phicomm_k2=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          echo "CONFIG_PACKAGE_kmod-wireguard=y" >> .config
          echo "CONFIG_PACKAGE_wireguard-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-wireguard=y" >> .config
          echo "CONFIG_PACKAGE_zerotier=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-zerotier=y" >> .config
          make defconfig

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download
        run: |
          cd openwrt
          make download -j8

      - name: Compile
        run: |
          cd openwrt
          make tools/compile -j$(nproc)
          make toolchain/compile -j$(nproc)
          make -j$(nproc) V=s || make -j1 V=s

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: K2-24.10.5-ChineseUI
          path: openwrt/bin/targets/**/*.bin
          retention-days: 30
