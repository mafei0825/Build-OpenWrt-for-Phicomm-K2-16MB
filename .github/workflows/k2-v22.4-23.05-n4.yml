name: K2 v22.4 OpenWrt 23.05.5 16M + chn n4

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 OpenWrt 23.05.5 源码
        run: |
          git clone --depth 1 -b openwrt-23.05 https://github.com/openwrt/openwrt.git
          cd openwrt
          git fetch --tags
          git checkout v23.05.5
          echo "✅ OpenWrt 23.05.5 源码下载完成"

      # ========== 1. 16M闪存适配 ==========
      - name: 🔧 修改 DTS 文件 (8MB -> 16MB)
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          if [ -f "$FILE" ]; then
            echo "========================================="
            echo "📄 修改前 DTS 内容:"
            echo "========================================="
            cat "$FILE"
            echo ""
            echo "【执行修改】将 0x7b0000 替换为 0x1fb0000"
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            echo ""
            echo "========================================="
            echo "📄 修改后 DTS 内容:"
            echo "========================================="
            cat "$FILE"
            echo "✅ v22.4 DTS 修改完成"
          else
            echo "❌ 文件不存在: $FILE"; exit 1
          fi

      - name: 🔧 修改 Makefile (8MB -> 16MB)
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            echo "========================================="
            echo "📄 修改前 Makefile 内容:"
            echo "========================================="
            cat "$MK_FILE"
            echo ""
            echo "【执行修改】将 IMAGE_SIZE 改为 16064k"
            sed -i '/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            echo ""
            echo "========================================="
            echo "📄 修改后 Makefile 内容:"
            echo "========================================="
            cat "$MK_FILE"
            echo "✅ Makefile 修改完成"
          else
            echo "❌ 文件不存在: $MK_FILE"; exit 1
          fi

      # ========== 2. 创建配置文件 - 只包含K2 v22.4 + 全功能中文LuCI ==========
      - name: 📝 创建配置文件（全功能中文LuCI版）
        run: |
          cd openwrt
          
          # 从官方下载基础配置
          wget -O .config.base \
          https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7620/config.buildinfo
          
          # 过滤出只包含K2 v22.4的配置
          grep -v "CONFIG_TARGET_DEVICE_ramips_mt7620_DEVICE_" .config.base | \
          grep -v "CONFIG_TARGET_DEVICE_PACKAGES_" > .config
          
          # 添加K2 v22.4为唯一设备
          echo "CONFIG_TARGET_DEVICE_ramips_mt7620_DEVICE_phicomm_k2-v22.4=y" >> .config
          echo "CONFIG_TARGET_DEVICE_PACKAGES_ramips_mt7620_DEVICE_phicomm_k2-v22.4=\"\"" >> .config
          
          # 设置16M闪存
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config
          
          # ===== 关键步骤：锁定VERMAGIC =====
          echo "CONFIG_KERNEL_VERMAGIC=\"5bc03255e08a37a54dbb31ad01735f42\"" >> .config
          echo "✅ 已锁定VERMAGIC为官方值: 5bc03255e08a37a54dbb31ad01735f42"
          
          # 确保优化选项与官方一致
          echo "CONFIG_KERNEL_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> .config
          echo "# CONFIG_KERNEL_CC_OPTIMIZE_FOR_SIZE is not set" >> .config
          
          # 禁用调试选项
          echo "# CONFIG_KERNEL_DEBUG_INFO is not set" >> .config
          echo "# CONFIG_KERNEL_DEBUG_KERNEL is not set" >> .config
          
          # ===== 全功能中文LuCI =====
          echo "# LuCI核心组件" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config
          echo "CONFIG_PACKAGE_luci-mod-admin-full=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-bootstrap=y" >> .config
          
          echo "# 防火墙和应用" >> .config
          echo "CONFIG_PACKAGE_luci-app-firewall=y" >> .config
          echo "CONFIG_PACKAGE_firewall=y" >> .config
          echo "CONFIG_PACKAGE_firewall4=y" >> .config
          
          echo "# 中文语言包" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          
          echo "# Web服务器" >> .config
          echo "CONFIG_PACKAGE_uhttpd=y" >> .config
          echo "CONFIG_PACKAGE_uhttpd-mod-ubus=y" >> .config
          
          echo "# 基础服务和工具" >> .config
          echo "CONFIG_PACKAGE_rpcd=y" >> .config
          echo "CONFIG_PACKAGE_rpcd-mod-file=y" >> .config
          echo "CONFIG_PACKAGE_rpcd-mod-luci=y" >> .config
          echo "CONFIG_PACKAGE_rpcd-mod-ucode=y" >> .config
          echo "CONFIG_PACKAGE_rpcd-mod-iwinfo=y" >> .config
          echo "CONFIG_PACKAGE_cgi-io=y" >> .config
          
          echo "# 依赖库" >> .config
          echo "CONFIG_PACKAGE_liblucihttp0=y" >> .config
          echo "CONFIG_PACKAGE_liblucihttp-ucode=y" >> .config
          echo "CONFIG_PACKAGE_ucode-mod-math=y" >> .config
          echo "CONFIG_PACKAGE_ucode-mod-html=y" >> .config
          
          echo "# 无线驱动" >> .config
          echo "CONFIG_PACKAGE_kmod-mt76-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt76x2=y" >> .config
          
          echo "# 基础工具" >> .config
          echo "CONFIG_PACKAGE_iperf3=y" >> .config
          echo "CONFIG_PACKAGE_tcpdump=y" >> .config
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_nano=y" >> .config
          
          # 运行defconfig
          make defconfig
          
          # 验证配置
          echo "✅ 配置文件创建完成，包含以下设备:"
          grep "CONFIG_TARGET_DEVICE_ramips_mt7620_DEVICE_" .config | grep "=y"
          echo ""
          echo "✅ 已启用的中文语言包:"
          grep "CONFIG_PACKAGE.*i18n.*zh-cn" .config | grep "=y" || true

      # ========== 3. 更新 Feeds ==========
      - name: 🔄 更新 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ========== 4. 下载源代码 ==========
      - name: 📥 下载源代码
        run: |
          cd openwrt
          make download -j8

      # ========== 5. 编译固件 ==========
      - name: ⚙️ 编译固件
        run: |
          cd openwrt
          echo "开始编译时间: $(date)"
          echo "只编译K2 v22.4设备，包含全功能中文LuCI..."
          make -j$(nproc) V=s
          echo "编译完成时间: $(date)"

      # ========== 6. 验证编译结果 ==========
      - name: ✅ 验证编译结果
        run: |
          cd openwrt
          echo "========================================="
          echo "✅ 验证编译结果"
          echo "========================================="
          
          # 查找编译出的固件
          echo "【编译出的固件文件】"
          find bin/targets/ -name "*.bin" -ls
          
          # 验证VERMAGIC
          echo ""
          echo "【VERMAGIC验证】"
          echo "锁定的VERMAGIC: 5bc03255e08a37a54dbb31ad01735f42"
          
          # 查找生成的 .vermagic
          for f in $(find build_dir/ -name ".vermagic" 2>/dev/null); do
            CURRENT_HASH=$(cat $f)
            echo "生成VERMAGIC: $CURRENT_HASH"
            if [ "$CURRENT_HASH" = "5bc03255e08a37a54dbb31ad01735f42" ]; then
              echo "✅ VERMAGIC 匹配成功！"
            else
              echo "⚠️ VERMAGIC 不匹配！"
            fi
          done

      # ========== 7. 整理固件文件 ==========
      - name: 📦 整理固件文件
        run: |
          cd openwrt
          mkdir -p firmware
          
          echo "查找固件文件..."
          find bin/targets/ -name "*k2-v22.4*.bin" -o -name "*sysupgrade*.bin" | while read file; do
            cp "$file" firmware/
            echo "已复制: $(basename $file)"
          done
          
          cd firmware
          echo "生成MD5校验文件..."
          md5sum *.bin > md5sums.txt
          
          echo ""
          echo "固件文件列表:"
          ls -la *.bin

      # ========== 8. 创建完整的软件源配置文件 ==========
      - name: 📄 创建 /etc/opkg/distfeeds.conf
        run: |
          cd openwrt
          
          mkdir -p files/etc/opkg
          
          echo "src/gz openwrt_core https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7620/packages" > files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_base https://downloads.openwrt.org/releases/23.05.5/packages/mipsel_24kc/base" >> files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_luci https://downloads.openwrt.org/releases/23.05.5/packages/mipsel_24kc/luci" >> files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_packages https://downloads.openwrt.org/releases/23.05.5/packages/mipsel_24kc/packages" >> files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_routing https://downloads.openwrt.org/releases/23.05.5/packages/mipsel_24kc/routing" >> files/etc/opkg/distfeeds.conf
          echo "src/gz openwrt_telephony https://downloads.openwrt.org/releases/23.05.5/packages/mipsel_24kc/telephony" >> files/etc/opkg/distfeeds.conf
          
          echo "✅ 完整的软件源配置文件已创建"
          cat files/etc/opkg/distfeeds.conf

      # ========== 9. 创建README文件 ==========
      - name: 📄 创建README文件
        run: |
          cd openwrt/firmware
          
          echo "================================================" > README.txt
          echo "Phicomm K2 v22.4 OpenWrt 23.05.5 Firmware (16MB) - 全功能中文版" >> README.txt
          echo "================================================" >> README.txt
          echo "" >> README.txt
          echo "【固件信息】" >> README.txt
          echo "版本: OpenWrt 23.05.5" >> README.txt
          echo "机型: 斐讯K2 v22.4 (A1/A2) - 必须硬改16M闪存" >> README.txt
          echo "闪存布局: 公版布局 (firmware分区起始: 0x50000)" >> README.txt
          echo "内核版本: 5.15.167-1" >> README.txt
          echo "VERMAGIC: 5bc03255e08a37a54dbb31ad01735f42 (官方值)" >> README.txt
          echo "界面: 简体中文 (已预装)" >> README.txt
          echo "" >> README.txt
          echo "【预装组件】" >> README.txt
          echo "✓ LuCI Web界面 (简体中文)" >> README.txt
          echo "✓ uhttpd Web服务器" >> README.txt
          echo "✓ 防火墙 (含中文界面)" >> README.txt
          echo "✓ 无线驱动 (2.4G/5G)" >> README.txt
          echo "✓ 基础工具 (htop, nano, iperf3, tcpdump)" >> README.txt
          echo "" >> README.txt
          echo "【核心特性】" >> README.txt
          echo "✓ 只编译K2 v22.4单一设备，不包含其他MT7620设备" >> README.txt
          echo "✓ 强制锁定VERMAGIC为官方值，完美兼容官方源" >> README.txt
          echo "✓ 16M闪存适配 (DTS和IMAGE_SIZE已修改)" >> README.txt
          echo "✓ 预置完整的软件源配置，opkg可直接使用" >> README.txt
          echo "" >> README.txt
          echo "【刷机步骤】" >> README.txt
          echo "1. 进入Breed (按住Reset键上电)" >> README.txt
          echo "2. 选择'固件更新'" >> README.txt
          echo "3. 选择本固件文件 (*.bin)" >> README.txt
          echo "4. ⚠️ 闪存布局必须选'公版'或'0x50000'" >> README.txt
          echo "5. 点击上传并确认" >> README.txt
          echo "6. 等待自动重启 (约2分钟)" >> README.txt
          echo "" >> README.txt
          echo "【默认配置】" >> README.txt
          echo "管理地址: http://192.168.1.1" >> README.txt
          echo "用户名: root" >> README.txt
          echo "密码: (空密码)" >> README.txt
          echo "" >> README.txt
          echo "编译时间: $(date)" >> README.txt
          echo "================================================" >> README.txt
          
          echo "✅ README文件创建完成"

      # ========== 10. 上传固件 ==========
      - name: ⬆️ 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: K2-v22.4-16M-23.05.5-全功能中文版-官方VERMAGIC
          path: |
            openwrt/firmware/
            openwrt/files/
          retention-days: 30
