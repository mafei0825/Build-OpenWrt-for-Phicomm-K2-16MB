name: K2 v22.4 OpenWrt 23.05.5 16M-base

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 OpenWrt 23.05.5 源码
        run: |
          git clone --depth 1 -b openwrt-23.05 https://github.com/openwrt/openwrt.git
          cd openwrt
          git fetch --tags
          git checkout v23.05.5
          echo "✅ OpenWrt 23.05.5 源码下载完成"

      # ========== 1. 16M闪存适配：修改 DTS ==========
      - name: 🔧 修改 DTS (8MB -> 16MB)
        run: |
          cd openwrt
          FILE="target/linux/ramips/dts/mt7620a_phicomm_k2-v22.4.dts"
          if [ -f "$FILE" ]; then
            echo "修改前 DTS 分区大小："
            grep "reg = <0x50000" "$FILE"
            sed -i 's/reg = <0x50000 0x7b0000>/reg = <0x50000 0x1fb0000>/' "$FILE"
            echo "修改后 DTS 分区大小："
            grep "reg = <0x50000" "$FILE"
            echo "✅ DTS 修改完成"
          else
            echo "❌ DTS 文件不存在"; exit 1
          fi

      # ========== 2. 16M闪存适配：修改 Makefile ==========
      - name: 🔧 修改 Makefile (IMAGE_SIZE 8MB -> 16MB)
        run: |
          cd openwrt
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            echo "修改前 IMAGE_SIZE："
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE" || echo "未找到"
            sed -i '/phicomm_k2-v22.4/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            echo "修改后 IMAGE_SIZE："
            grep -A5 "phicomm_k2-v22.4" "$MK_FILE" | grep "IMAGE_SIZE"
            echo "✅ Makefile 修改完成"
          else
            echo "❌ Makefile 不存在"; exit 1
          fi

      # ========== 3. 创建极简配置文件（仅K2 v22.4 + 16M闪存）==========
      - name: 📝 创建 .config
        run: |
          cd openwrt
          # 使用逐行echo确保语法正确
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2-v22.4=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config
          # 不添加任何额外软件包，保持最小系统
          make defconfig
          echo "✅ 配置完成，当前包含设备："
          grep "CONFIG_TARGET_DEVICE_ramips_mt7620_DEVICE_" .config | grep "=y"

      # ========== 4. 更新 feeds ==========
      - name: 🔄 更新 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ========== 5. 下载源代码包 ==========
      - name: 📥 下载源代码
        run: |
          cd openwrt
          make download -j8

      # ========== 6. 编译固件 ==========
      - name: ⚙️ 编译固件
        run: |
          cd openwrt
          echo "开始编译时间: $(date)"
          make -j$(nproc) V=s
          echo "编译完成时间: $(date)"

      # ========== 7. 整理固件文件 ==========
      - name: 📦 整理固件
        run: |
          cd openwrt
          mkdir -p firmware
          find bin/targets/ -name "*.bin" -exec cp {} firmware/ \;
          cd firmware
          md5sum *.bin > md5sums.txt
          echo "固件列表："
          ls -la

      # ========== 8. 上传固件 ==========
      - name: ⬆️ 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: K2-v22.4-16M-23.05.5-基础系统
          path: openwrt/firmware/
          retention-days: 30
