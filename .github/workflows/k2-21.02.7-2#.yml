name: Build K2 OpenWrt 21.02.7 Chinese UI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OpenWrt 21.02.7 source
        run: |
          git clone --depth 1 -b openwrt-21.02 https://github.com/openwrt/openwrt.git
          cd openwrt
          git fetch --tags
          git checkout v21.02.7
          echo "✅ OpenWrt 21.02.7 source downloaded"

      # ========== 1. 查找并显示 DTS 文件 ==========
      - name: 🔍 Find and show DTS file
        run: |
          cd openwrt
          echo "========================================="
          echo "🔍 查找 K2 DTS 文件"
          echo "========================================="
          
          echo "查找 mt7620a_phicomm_k2.dts:"
          find target/linux/ramips/dts -name "mt7620a_phicomm_k2.dts" -ls || echo "未找到"
          
          echo ""
          echo "查找所有包含 phicomm 的 DTS 文件:"
          find target/linux/ramips/dts -name "*phicomm*" -ls || echo "未找到"

      # ========== 2. 显示修改前的 DTS 内容 ==========
      - name: 📄 Show DTS before modification
        run: |
          cd openwrt
          echo "========================================="
          echo "📄 DTS 文件修改前的内容"
          echo "========================================="
          
          DTS_FILE="target/linux/ramips/dts/mt7620a_phicomm_k2.dts"
          
          if [ -f "$DTS_FILE" ]; then
            echo "文件: $DTS_FILE"
            echo ""
            echo "partition@50000 定义:"
            grep -A10 "partition@50000" "$DTS_FILE" | head -15
          else
            echo "❌ DTS 文件不存在"
          fi

      # ========== 3. 修改 DTS 文件 ==========
      - name: ✏️ Modify DTS for 16MB flash
        run: |
          cd openwrt
          echo "========================================="
          echo "✏️ 修改 DTS 文件支持 16MB 闪存"
          echo "========================================="
          
          DTS_FILE="target/linux/ramips/dts/mt7620a_phicomm_k2.dts"
          
          if [ -f "$DTS_FILE" ]; then
            # 备份
            cp "$DTS_FILE" "${DTS_FILE}.bak"
            
            # 记录原始值
            OLD_VALUE=$(grep "reg = <0x50000" "$DTS_FILE" | grep -o "0x[0-9a-f]\+" | tail -1)
            echo "原始 firmware 大小: $OLD_VALUE"
            
            # 修改为 16MB (0x1fb0000)
            sed -i 's/reg = <0x50000 0xfb0000>/reg = <0x50000 0x1fb0000>/' "$DTS_FILE"
            
            # 验证修改
            NEW_VALUE=$(grep "reg = <0x50000" "$DTS_FILE" | grep -o "0x[0-9a-f]\+" | tail -1)
            echo "修改后 firmware 大小: $NEW_VALUE"
            
            if [ "$NEW_VALUE" = "0x1fb0000" ]; then
              echo "✅ DTS 修改成功: 8MB -> 16MB"
            else
              echo "❌ DTS 修改失败"
            fi
          else
            echo "❌ DTS 文件不存在，无法修改"
          fi

      # ========== 4. 查找并显示 Makefile ==========
      - name: 🔍 Find and show Makefile
        run: |
          cd openwrt
          echo "========================================="
          echo "🔍 查找 mt7620.mk 文件"
          echo "========================================="
          
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          
          if [ -f "$MK_FILE" ]; then
            echo "✅ 找到 Makefile: $MK_FILE"
          else
            echo "❌ 未找到 $MK_FILE"
          fi

      # ========== 5. 显示修改前的 Makefile 内容 ==========
      - name: 📄 Show Makefile before modification
        run: |
          cd openwrt
          echo "========================================="
          echo "📄 Makefile 修改前的内容"
          echo "========================================="
          
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          
          if [ -f "$MK_FILE" ]; then
            echo "Device/phicomm_k2 定义:"
            echo ""
            sed -n '/define Device\/phicomm_k2/,/endef/p' "$MK_FILE"
          fi

      # ========== 6. 修改 Makefile 的 IMAGE_SIZE ==========
      - name: ✏️ Modify Makefile IMAGE_SIZE for 16MB
        run: |
          cd openwrt
          echo "========================================="
          echo "✏️ 修改 Makefile IMAGE_SIZE 为 16MB"
          echo "========================================="
          
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          
          if [ -f "$MK_FILE" ]; then
            # 记录原始值
            OLD_SIZE=$(sed -n '/define Device\/phicomm_k2/,/endef/p' "$MK_FILE" | grep "IMAGE_SIZE" | grep -o "[0-9]\+k" || echo "未找到")
            echo "原始 IMAGE_SIZE: $OLD_SIZE"
            
            # 修改为 16MB (16064k)
            sed -i '/define Device\/phicomm_k2/,/endef/ s/IMAGE_SIZE := .*/IMAGE_SIZE := 16064k/' "$MK_FILE"
            
            # 验证修改
            NEW_SIZE=$(sed -n '/define Device\/phicomm_k2/,/endef/p' "$MK_FILE" | grep "IMAGE_SIZE" | grep -o "[0-9]\+k")
            echo "修改后 IMAGE_SIZE: $NEW_SIZE"
            
            if [ "$NEW_SIZE" = "16064k" ]; then
              echo "✅ Makefile 修改成功: 8MB -> 16MB"
            else
              echo "❌ Makefile 修改失败"
            fi
          else
            echo "❌ Makefile 不存在，无法修改"
          fi

      # ========== 7. 显示修改后的最终结果 ==========
      - name: ✅ Show final modifications
        run: |
          cd openwrt
          echo "========================================="
          echo "✅ 最终修改结果验证"
          echo "========================================="
          
          # 验证 DTS
          DTS_FILE="target/linux/ramips/dts/mt7620a_phicomm_k2.dts"
          if [ -f "$DTS_FILE" ]; then
            DTS_SIZE=$(grep "reg = <0x50000" "$DTS_FILE" | grep -o "0x[0-9a-f]\+" | tail -1)
            echo "DTS firmware 大小: $DTS_SIZE"
            if [ "$DTS_SIZE" = "0x1fb0000" ]; then
              echo "  └─ ✅ 正确 (16MB)"
            else
              echo "  └─ ❌ 错误 (应该是 0x1fb0000)"
            fi
          fi
          
          # 验证 Makefile
          MK_FILE="target/linux/ramips/image/mt7620.mk"
          if [ -f "$MK_FILE" ]; then
            MK_SIZE=$(sed -n '/define Device\/phicomm_k2/,/endef/p' "$MK_FILE" | grep "IMAGE_SIZE" | grep -o "[0-9]\+k")
            echo "Makefile IMAGE_SIZE: $MK_SIZE"
            if [ "$MK_SIZE" = "16064k" ]; then
              echo "  └─ ✅ 正确 (16MB)"
            else
              echo "  └─ ❌ 错误 (应该是 16064k)"
            fi
          fi

      # ========== 8. 创建配置文件 ==========
      - name: Create config file
        run: |
          cd openwrt
          
          # 使用逐行echo避免多行字符串语法问题
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7620_DEVICE_phicomm_k2=y" >> .config
          echo "CONFIG_TARGET_DEVICE_ramips_mt7620_DEVICE_phicomm_k2=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-firewall=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          echo "CONFIG_PACKAGE_kmod-wireguard=y" >> .config
          echo "CONFIG_PACKAGE_wireguard-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-wireguard=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-wireguard-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_zerotier=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-zerotier=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-zerotier-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt76-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt76x2=y" >> .config
          
          make defconfig

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download packages
        run: |
          cd openwrt
          make download -j8

      - name: Compile firmware
        run: |
          cd openwrt
          echo "开始编译时间: $(date)"
          make tools/compile -j$(nproc)
          make toolchain/compile -j$(nproc)
          make -j$(nproc) V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: K2-16M-21.02.7-ChineseUI
          path: openwrt/bin/targets/**/*.bin
          retention-days: 30
